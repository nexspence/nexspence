apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexspence.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexspence.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "nexspence.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "nexspence.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "nexspence.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: nexspence
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            # Pin the trivy (CVE scan) cache to the writable emptyDir below.
            # The image sets these too, but pinning them here keeps scans
            # working under readOnlyRootFilesystem regardless of image build —
            # trivy's default cache ($HOME/.cache/trivy) would otherwise resolve
            # onto the read-only rootfs and every image scan would fail.
            - name: HOME
              value: /app
            - name: TRIVY_CACHE_DIR
              value: /app/.cache/trivy
          envFrom:
            - configMapRef:
                name: {{ include "nexspence.fullname" . }}
            - secretRef:
                name: {{ include "nexspence.fullname" . }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # readOnlyRootFilesystem makes the container fs read-only, so every
            # path the app / bundled trivy writes to needs a writable mount.
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache
            {{- if eq .Values.storage.type "local" }}
            - name: blobs
              mountPath: {{ .Values.storage.local.mountPath }}
            {{- end }}
      volumes:
        # Writable scratch dirs (rootfs is read-only). The trivy cache lives at
        # /app/.cache (HOME=/app, TRIVY_CACHE_DIR=/app/.cache/trivy in the image).
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        {{- if eq .Values.storage.type "local" }}
        - name: blobs
          persistentVolumeClaim:
            claimName: {{ include "nexspence.fullname" . }}-blobs
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
