# Nexspence HA reference deployment — 2 nodes + shared Postgres + Redis + MinIO
# Usage: docker compose -f docker-compose.ha.yml up --build
#
# Web UI available at http://localhost:8080 (nginx rounds between both nodes)

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexspence
      POSTGRES_PASSWORD: nexspence
      POSTGRES_DB: nexspence
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexspence"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/nexspence-blobs
      "

  nexspence_1: &nexspence_base
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${NEXSPENCE_VERSION:-dev}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NEXSPENCE_DATABASE_DSN: "postgres://nexspence:nexspence@postgres:5432/nexspence?sslmode=disable"
      NEXSPENCE_HTTP_ADDR: ":8081"
      NEXSPENCE_STORAGE_DEFAULT_TYPE: "s3"
      NEXSPENCE_STORAGE_S3_ENDPOINT: "http://minio:9000"
      NEXSPENCE_STORAGE_S3_BUCKET: "nexspence-blobs"
      NEXSPENCE_STORAGE_S3_ACCESS_KEY_ID: "minioadmin"
      NEXSPENCE_STORAGE_S3_SECRET_ACCESS_KEY: "minioadmin"
      NEXSPENCE_STORAGE_S3_FORCE_PATH_STYLE: "true"
      NEXSPENCE_STORAGE_S3_REGION: "us-east-1"
      NEXSPENCE_REDIS_ENABLED: "true"
      NEXSPENCE_REDIS_ADDR: "redis:6379"
      NEXSPENCE_AUTH_JWT_SECRET: "${NEXSPENCE_JWT_SECRET:-change-me-in-production-32chars}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  nexspence_2:
    <<: *nexspence_base

  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/nginx-ha.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      nexspence_1:
        condition: service_healthy
      nexspence_2:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
