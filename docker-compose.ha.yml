# Nexspence HA deployment — 2 nodes + Postgres + Redis + MinIO + nginx
#
# Run modes:
#   Without Keycloak (default):  docker compose -f docker-compose.ha.yml up
#   With Keycloak SSO:           OIDC_ENABLED=true docker compose -f docker-compose.ha.yml --profile keycloak up
#
# Web UI: http://localhost:8080 (nginx load balancer, round-robin across both nodes)

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexspence
      POSTGRES_PASSWORD: nexspence
      POSTGRES_DB: nexspence
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexspence"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Keycloak (optional OIDC IdP, profile: keycloak) ─────────────────
  # Start with: OIDC_ENABLED=true docker compose -f docker-compose.ha.yml --profile keycloak up
  # Realm "nexspence" is auto-imported on first start from keycloak/nexspence-realm.json.
  # Admin UI: http://localhost:8180  (admin / admin)
  # Test user: testuser / testpass  (in group nexspence-admins → gets nx-admin role)
  keycloak:
    profiles: [keycloak]
    image: quay.io/keycloak/keycloak:24.0
    hostname: keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: "8080"
      KC_HOSTNAME: "localhost"
      KC_HOSTNAME_PORT: "8180"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_DB: dev-mem
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /realms/nexspence/.well-known/openid-configuration HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q issuer"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/nexspence-blobs
      "

  nexspence_1: &nexspence_base
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${NEXSPENCE_VERSION:-dev}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
        required: false
    environment:
      NEXSPENCE_DATABASE_DSN: "postgres://nexspence:nexspence@postgres:5432/nexspence?sslmode=disable"
      NEXSPENCE_HTTP_ADDR: ":8081"
      NEXSPENCE_STORAGE_DEFAULT_TYPE: "s3"
      NEXSPENCE_STORAGE_S3_ENDPOINT: "http://minio:9000"
      NEXSPENCE_STORAGE_S3_BUCKET: "nexspence-blobs"
      NEXSPENCE_STORAGE_S3_ACCESS_KEY_ID: "minioadmin"
      NEXSPENCE_STORAGE_S3_SECRET_ACCESS_KEY: "minioadmin"
      NEXSPENCE_STORAGE_S3_FORCE_PATH_STYLE: "true"
      NEXSPENCE_STORAGE_S3_REGION: "us-east-1"
      NEXSPENCE_REDIS_ENABLED: "true"
      NEXSPENCE_REDIS_ADDR: "redis:6379"
      NEXSPENCE_AUTH_JWT_SECRET: "${NEXSPENCE_JWT_SECRET:-change-me-in-production-32chars}"
      # ── OIDC (Keycloak dev IdP, active when OIDC_ENABLED=true) ──────
      # In HA mode the load balancer (nginx :8080) fronts both nodes,
      # so redirect_url and frontend_base_url point to nginx, not to a node.
      NEXSPENCE_OIDC_ENABLED: "${OIDC_ENABLED:-false}"
      NEXSPENCE_OIDC_DISPLAY_NAME: "Keycloak"
      NEXSPENCE_OIDC_ISSUER: "http://keycloak:8080/realms/nexspence"
      NEXSPENCE_OIDC_PUBLIC_ISSUER_URL: "http://localhost:8180/realms/nexspence"
      NEXSPENCE_OIDC_CLIENT_ID: "nexspence"
      NEXSPENCE_OIDC_CLIENT_SECRET: "dev-oidc-secret-nexspence"
      NEXSPENCE_OIDC_REDIRECT_URL: "http://localhost:8080/api/v1/auth/oidc/callback"
      NEXSPENCE_OIDC_FRONTEND_BASE_URL: "http://localhost:8080"
      NEXSPENCE_OIDC_COOKIE_SECURE: "false"
      NEXSPENCE_OIDC_COOKIE_KEY: "YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY="
      NEXSPENCE_OIDC_ADMIN_GROUP: "nexspence-admins"
      NEXSPENCE_OIDC_GROUPS_CLAIM: "groups"
      NEXSPENCE_OIDC_PROVISIONING: "jit"
      NEXSPENCE_OIDC_SCOPES: "openid,profile,email"
    volumes:
      - ${CONFIG_FILE:-./config.yaml.example}:/app/config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  nexspence_2:
    <<: *nexspence_base
    depends_on:
      nexspence_1:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/nginx-ha.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      nexspence_1:
        condition: service_healthy
      nexspence_2:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
