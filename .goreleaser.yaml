version: 2

project_name: nexspence

before:
  hooks:
    - go mod download
    - bash -c "cd frontend && npm ci && npm run build"

builds:
  - id: nexspence
    main: ./cmd/server
    binary: nexspence
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -tags=embed_ui
    ldflags:
      - -s -w -X main.Version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - nexspence
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - config.yaml.example
      - packaging/INSTALL.md
      - packaging/systemd/nexspence.service
      - packaging/launchd/com.nexspence.server.plist
      - packaging/windows/install-service.ps1
      - packaging/windows/uninstall-service.ps1

nfpms:
  - id: packages
    package_name: nexspence
    ids:
      - nexspence
    vendor: Nexspence
    homepage: https://nexspence.com
    maintainer: Nexspence <noreply@nexspence.com>
    description: Free, open-source universal artifact repository manager.
    license: AGPL-3.0
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: config.yaml.example
        dst: /etc/nexspence/config.yaml
        type: "config|noreplace"
      - src: packaging/systemd/nexspence.service
        dst: /lib/systemd/system/nexspence.service
    scripts:
      postinstall: packaging/nfpm/postinstall.sh
      preremove: packaging/nfpm/preremove.sh
      postremove: packaging/nfpm/postremove.sh

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  use: git              # parse local nexspence-core git log; cross-repo safe
  sort: asc
  filters:
    exclude:
      - '^chore:'
      - '^ci:'
      - '^test:'
      - '^build:'
      - '^style:'
      - '^Merge '
  groups:
    - title: "✨ Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: "📚 Documentation"
      regexp: '^.*?docs(\(.+\))??!?:.+$'
      order: 2
    - title: "🔧 Others"
      order: 999

release:
  github:
    owner: nexspence
    name: nexspence
  mode: replace
  # Cross-repo release: the tag exists on nexspence-core (where we build), not on
  # nexspence/nexspence. Pin the tag/release to the public repo's main branch so
  # GitHub creates the tag there — mirroring the prior `gh release create` flow.
  target_commitish: main
  extra_files:
    - glob: ./release-assets/nexspence-*.zip
  footer: |
    ### 🐳 Docker

    | | |
    |---|---|
    | **Image** | `ghcr.io/nexspence/nexspence:{{ .Tag }}` |
    | **Platforms** | linux/amd64, linux/arm64 |

    ```bash
    docker pull ghcr.io/nexspence/nexspence:{{ .Tag }}
    ```

    #### Quick start

    Download `nexspence-{{ .Tag }}.zip`, extract it, rename
    `config.yaml.example` → `config.yaml`, and set the admin password and JWT secret.

    | Mode | Command |
    |------|---------|
    | Single-node | `docker compose up -d` |
    | Single-node + Monitoring | `docker compose --profile monitoring up -d` |
    | Single-node + Keycloak SSO | `OIDC_ENABLED=true docker compose --profile keycloak up -d` |
    | HA (2 nodes + nginx) | `docker compose -f docker-compose.ha.yml up -d` |

    **Web UI:** single-node → `http://localhost:8081` · HA → `http://localhost:8080`

    Native install (deb/rpm/macOS/Windows): see
    [docs/install-local.md](https://github.com/nexspence/nexspence/blob/main/docs/install-local.md).
