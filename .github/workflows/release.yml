name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: skensell201/nexspence

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub release + upload assets
      packages: write   # push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.RELEASE_PAT }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=https://github.com/skensell201/nexspence

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare release assets
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
        run: |
          mkdir release-assets

          # Replace build block with pre-built image reference
          python3 - <<'PYEOF'
          import re, os, sys

          image = os.environ['IMAGE']

          with open('docker-compose.yml') as f:
              content = f.read()

          patched, n = re.subn(
              r'(?m)(    )build:\n(?:[ ]{6,}[^\n]*\n)+',
              lambda m: m.group(1) + f'image: {image}\n',
              content,
          )

          if n == 0:
              print('WARNING: build block not found — check docker-compose.yml format', file=sys.stderr)

          with open('release-assets/docker-compose.yml', 'w') as f:
              f.write(patched)

          print(f'Generated docker-compose.yml with image={image}')
          PYEOF

          cp config.yaml.example release-assets/config.yaml.example

          cd release-assets
          zip "nexspence-${{ github.ref_name }}.zip" docker-compose.yml config.yaml.example
          cd ..

      - name: Build release notes
        run: |
          cat > release-notes.md <<'HEADER'
          ## Docker image

          ```
          ghcr.io/skensell201/nexspence:${{ github.ref_name }}
          ```

          ```bash
          docker pull ghcr.io/skensell201/nexspence:${{ github.ref_name }}
          ```

          ## Quick start

          1. Download `docker-compose.yml` and `config.yaml.example` from this release
          2. Rename `config.yaml.example` → `config.yaml` and edit: admin password, JWT secret, DB DSN
          3. `docker compose up -d`

          Web UI: `http://localhost:8081`

          ---

          HEADER

          if [ -s NEXT_RELEASE.md ]; then
            cat NEXT_RELEASE.md >> release-notes.md
          else
            echo "_No changelog entries recorded for this release._" >> release-notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo skensell201/nexspence \
            --title "Nexspence ${{ github.ref_name }}" \
            --notes-file release-notes.md \
            "release-assets/nexspence-${{ github.ref_name }}.zip"

      - name: Reset changelog for next release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          > NEXT_RELEASE.md
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add NEXT_RELEASE.md
          git commit -m "chore: reset NEXT_RELEASE.md after ${{ github.ref_name }}" || true
          git push origin HEAD:main || true
