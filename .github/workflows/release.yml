name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nexspence/nexspence

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub release + upload assets
      packages: write   # push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so we can switch to main after the tag-triggered detached HEAD
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.RELEASE_PAT }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=https://github.com/nexspence/nexspence

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare release assets
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
        run: |
          mkdir release-assets

          # Replace build block with pre-built image reference
          python3 - <<'PYEOF'
          import re, os, sys

          image = os.environ['IMAGE']
          build_re = re.compile(r'(?m)(    )build:\n(?:[ ]{6,}[^\n]*\n)+')

          for src, dst in [
              ('docker-compose.yml',    'release-assets/docker-compose.yml'),
              ('docker-compose.ha.yml', 'release-assets/docker-compose.ha.yml'),
          ]:
              with open(src) as f:
                  content = f.read()
              patched, n = build_re.subn(
                  lambda m: m.group(1) + f'image: {image}\n',
                  content,
              )
              if n == 0:
                  print(f'WARNING: build block not found in {src}', file=sys.stderr)
              with open(dst, 'w') as f:
                  f.write(patched)
              print(f'Generated {dst} with image={image}')
          PYEOF

          cp config.yaml.example release-assets/config.yaml.example
          cp -r deploy release-assets/
          cp -r keycloak release-assets/

          # Seed & repo-creation scripts
          mkdir release-assets/scripts
          cp scripts/seed-all.sh \
             scripts/seed-repos.sh \
             scripts/seed-packages.sh \
             scripts/seed-rbac.sh \
             scripts/seed-cleanup.sh \
             scripts/create-*.sh \
             release-assets/scripts/

          # Docs: seed testing guide + deployment guides
          mkdir release-assets/docs
          cp docs/seed-testing-guide.md \
             docs/deployment.md \
             docs/ha-setup.md \
             release-assets/docs/

          cd release-assets
          zip -r "nexspence-${{ github.ref_name }}.zip" \
            docker-compose.yml docker-compose.ha.yml \
            config.yaml.example \
            deploy/ \
            keycloak/ \
            scripts/ \
            docs/
          cd ..

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}

      - name: Sync docs and README to nexspence repo
        run: |
          git clone https://x-access-token:${{ secrets.RELEASE_PAT }}@github.com/nexspence/nexspence.git /tmp/nexspence-pub

          # Sync docs/
          rsync -a --delete docs/ /tmp/nexspence-pub/docs/

          # Sync Helm chart README
          mkdir -p /tmp/nexspence-pub/deploy/helm/nexspence
          cp deploy/helm/nexspence/README.md /tmp/nexspence-pub/deploy/helm/nexspence/README.md

          # Sync root README
          cp README.md /tmp/nexspence-pub/README.md

          cd /tmp/nexspence-pub
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ deploy/helm/nexspence/README.md README.md
          git diff --staged --quiet || \
            git commit -m "docs: sync from nexspence-core ${{ github.ref_name }}"
          git push origin main

