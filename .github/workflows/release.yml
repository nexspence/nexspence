name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: skensell201/nexspence

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub release + upload assets
      packages: write   # push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so we can switch to main after the tag-triggered detached HEAD
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.RELEASE_PAT }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=https://github.com/skensell201/nexspence

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare release assets
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
        run: |
          mkdir release-assets

          # Replace build block with pre-built image reference
          python3 - <<'PYEOF'
          import re, os, sys

          image = os.environ['IMAGE']
          build_re = re.compile(r'(?m)(    )build:\n(?:[ ]{6,}[^\n]*\n)+')

          for src, dst in [
              ('docker-compose.yml',    'release-assets/docker-compose.yml'),
              ('docker-compose.ha.yml', 'release-assets/docker-compose.ha.yml'),
          ]:
              with open(src) as f:
                  content = f.read()
              patched, n = build_re.subn(
                  lambda m: m.group(1) + f'image: {image}\n',
                  content,
              )
              if n == 0:
                  print(f'WARNING: build block not found in {src}', file=sys.stderr)
              with open(dst, 'w') as f:
                  f.write(patched)
              print(f'Generated {dst} with image={image}')
          PYEOF

          cp config.yaml.example release-assets/config.yaml.example
          cp -r deploy release-assets/
          cp -r keycloak release-assets/

          # Seed & repo-creation scripts
          mkdir release-assets/scripts
          cp scripts/seed-all.sh \
             scripts/seed-repos.sh \
             scripts/seed-packages.sh \
             scripts/seed-rbac.sh \
             scripts/seed-cleanup.sh \
             scripts/create-*.sh \
             release-assets/scripts/

          # Docs: seed testing guide + deployment guides
          mkdir release-assets/docs
          cp docs/seed-testing-guide.md \
             docs/deployment.md \
             docs/ha-setup.md \
             release-assets/docs/

          cd release-assets
          zip -r "nexspence-${{ github.ref_name }}.zip" \
            docker-compose.yml docker-compose.ha.yml \
            config.yaml.example \
            deploy/ \
            keycloak/ \
            scripts/ \
            docs/
          cd ..

      - name: Build release notes
        run: |
          if [ -s NEXT_RELEASE.md ]; then
            cat NEXT_RELEASE.md > release-notes.md
          else
            printf '### ✨ Features\n\n_No changes recorded._\n\n### 🐛 Bug Fixes\n\n_No bug fixes in this release._\n' > release-notes.md
          fi

          TAG="${{ github.ref_name }}"
          {
            printf '\n### 🐳 Docker\n\n'
            printf '| | |\n'
            printf '|---|---|\n'
            printf '| **Image** | `ghcr.io/skensell201/nexspence:%s` |\n' "$TAG"
            printf '| **Platforms** | linux/amd64, linux/arm64 |\n\n'
            printf '```bash\n'
            printf 'docker pull ghcr.io/skensell201/nexspence:%s\n' "$TAG"
            printf '```\n\n'
            printf '#### Quick start\n\n'
            printf 'Download the zip, extract it, rename `config.yaml.example` → `config.yaml` and edit the admin password and JWT secret.\n\n'
            printf '| Mode | Command |\n'
            printf '|------|---------|\n'
            printf '| Single-node | `docker compose up -d` |\n'
            printf '| Single-node + Keycloak SSO | `OIDC_ENABLED=true docker compose --profile keycloak up -d` |\n'
            printf '| HA (2 nodes + nginx) | `docker compose -f docker-compose.ha.yml up -d` |\n'
            printf '| HA + Keycloak SSO | `OIDC_ENABLED=true docker compose -f docker-compose.ha.yml --profile keycloak up -d` |\n\n'
            printf '**Web UI:** single-node → `http://localhost:8081` · HA → `http://localhost:8080`  \n'
            printf '**Keycloak admin:** `http://localhost:8180` (admin / admin)  \n'
            printf '**Test SSO user:** testuser / testpass (member of `nexspence-admins` → nx-admin role)  \n\n'
            printf '#### Demo seed (optional)\n\n'
            printf 'The zip includes `scripts/` and `docs/` directories.\n\n'
            printf '| Script | Purpose |\n'
            printf '|--------|---------|\n'
            printf '| `scripts/seed-all.sh` | Full demo: 42 repos + test packages + RBAC for dev/stage/test/prod |\n'
            printf '| `scripts/seed-repos.sh` | Repositories only (all 14 formats) |\n'
            printf '| `scripts/seed-rbac.sh` | RBAC for dev/stage/test/prod environments |\n'
            printf '| `scripts/seed-cleanup.sh --all` | Remove everything created by seed scripts |\n\n'
            printf 'See `docs/seed-testing-guide.md` for a full testing walkthrough.\n\n'
          } >> release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          gh release delete "${{ github.ref_name }}" \
            --repo skensell201/nexspence \
            --yes 2>/dev/null || true

          gh release create "${{ github.ref_name }}" \
            --repo skensell201/nexspence \
            --title "Nexspence ${{ github.ref_name }}" \
            --notes-file release-notes.md \
            "release-assets/nexspence-${{ github.ref_name }}.zip"

      - name: Sync docs and README to nexspence repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git clone https://x-access-token:${{ secrets.RELEASE_PAT }}@github.com/skensell201/nexspence.git /tmp/nexspence-pub

          # Sync docs/
          rsync -a --delete docs/ /tmp/nexspence-pub/docs/

          # Sync Helm chart README
          mkdir -p /tmp/nexspence-pub/deploy/helm/nexspence
          cp deploy/helm/nexspence/README.md /tmp/nexspence-pub/deploy/helm/nexspence/README.md

          # Sync root README
          cp README.md /tmp/nexspence-pub/README.md

          cd /tmp/nexspence-pub
          git add docs/ deploy/helm/nexspence/README.md README.md
          git diff --staged --quiet || \
            git commit -m "docs: sync from nexspence-core ${{ github.ref_name }}"
          git push origin main

      - name: Reset changelog for next release
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Switch from detached tag HEAD to the actual main branch
          git switch main
          printf '### ✨ Features\n\n\n### 🐛 Bug Fixes\n\n_No bug fixes in this release._\n' > NEXT_RELEASE.md
          git add NEXT_RELEASE.md
          # Commit only if there is something to commit
          git diff --staged --quiet || \
            git commit -m "chore: reset NEXT_RELEASE.md after ${{ github.ref_name }}"
          # PAT is already baked into the remote URL by the checkout step
          git push origin main
