name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nexspence/nexspence

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub release + upload assets
      packages: write   # push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Full history so we can switch to main after the tag-triggered detached HEAD
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.RELEASE_PAT }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=https://github.com/nexspence/nexspence

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

      - name: Scan image for vulnerabilities (report-only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        continue-on-error: true
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94  # v7.2.3
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}

      - name: Build & upload run-essentials bundle
        # The auto "Source code" archive now ships the full dev tree (the repo is the
        # full source). This curated bundle restores the prior run-essentials download
        # — config + image-pinned compose + Helm chart + nginx-ha + monitoring +
        # keycloak realm + seed scripts + README/LICENSE — for users who just want to
        # RUN Nexspence. Uploaded as a release asset (NOT a separate mirror repo).
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="release-bundle"
          DIR="${STAGE}/nexspence-${VERSION}"
          rm -rf "$STAGE"
          mkdir -p "$DIR/deploy/helm" "$DIR/scripts"

          cp config.yaml.example README.md LICENSE "$DIR/"
          cp -r deploy/helm/nexspence "$DIR/deploy/helm/nexspence"
          cp deploy/nginx-ha.conf "$DIR/deploy/"
          cp -r deploy/monitoring "$DIR/deploy/monitoring"
          rm -f "$DIR/deploy/monitoring/prometheus-token"   # strip local bind-mount artifact
          cp -r keycloak "$DIR/keycloak"
          cp scripts/seed-all.sh scripts/seed-repos.sh scripts/seed-packages.sh \
             scripts/seed-rbac.sh scripts/seed-cleanup.sh "$DIR/scripts/"
          cp scripts/create-*.sh "$DIR/scripts/"

          # Pin the compose files to the released image (no source to build in the bundle).
          DIR="$DIR" python3 - <<'PYEOF'
          import re, os
          image = os.environ['IMAGE']
          dst = os.environ['DIR']
          build_re = re.compile(r'(?m)(    )build:\n(?:[ ]{6,}[^\n]*\n)+')
          for f in ('docker-compose.yml', 'docker-compose.ha.yml'):
              with open(f) as fh:
                  content = fh.read()
              patched, _ = build_re.subn(lambda m: m.group(1) + f'image: {image}\n', content)
              with open(os.path.join(dst, f), 'w') as fh:
                  fh.write(patched)
          PYEOF

          ASSET="nexspence-run-essentials-${VERSION}.zip"
          ( cd "$STAGE" && zip -rq "../$ASSET" "nexspence-${VERSION}" )
          gh release upload "$GITHUB_REF_NAME" "$ASSET" --repo "$GITHUB_REPOSITORY" --clobber

      - name: Publish Helm chart to GHCR (OCI)
        # helm is pre-installed on ubuntu-latest runners. Packages the chart at the
        # release version and pushes it to oci://ghcr.io/<owner>/charts so users can
        # `helm install oci://ghcr.io/nexspence/charts/nexspence --version X.Y.Z`.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "${{ secrets.RELEASE_PAT }}" | helm registry login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin
          cd deploy/helm/nexspence
          # The postgresql sub-chart is vendored under charts/ (Chart.lock pinned),
          # so packaging needs no network and no extra dependency step.
          helm package . --version "$VERSION" --app-version "$VERSION"
          helm push "nexspence-${VERSION}.tgz" "oci://${REGISTRY}/${{ github.repository_owner }}/charts"
          echo "Pushed chart: oci://${REGISTRY}/${{ github.repository_owner }}/charts/nexspence:${VERSION}"

