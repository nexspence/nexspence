name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: skensell201/nexspence-website

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push website image
        uses: docker/build-push-action@v6
        with:
          context: ./website
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to droplet over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT }}
          script: |
            set -e
            IMAGE="ghcr.io/skensell201/nexspence-website:latest"

            docker pull "$IMAGE"

            # Free port 8080: remove the named container and any legacy
            # container still publishing 8080 (e.g. the old manual run).
            docker rm -f nexspence-website 2>/dev/null || true
            OLD=$(docker ps -q --filter "publish=8080")
            [ -n "$OLD" ] && docker rm -f $OLD || true

            docker run -d \
              --name nexspence-website \
              --restart unless-stopped \
              -p 127.0.0.1:8080:80 \
              "$IMAGE"

            docker image prune -f
