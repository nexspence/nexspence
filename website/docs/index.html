<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexspence Docs</title>
<meta name="description" content="Nexspence documentation — guides, API reference, and versioned changelog.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070b14;--bg2:#0c1322;
  --blue:#3b82f6;--cyan:#06b6d4;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;
  --text:#f1f5f9;--dim:#94a3b8;--faint:#475569;
  --glass:rgba(255,255,255,.04);--glasm:rgba(255,255,255,.07);
  --border:rgba(59,130,246,.14);--borhi:rgba(59,130,246,.38);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--blue),var(--purple));border-radius:3px}

.floatnav{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:200;display:flex;align-items:center;gap:2px;background:rgba(7,11,20,.85);border:1px solid var(--border);border-radius:100px;padding:5px;backdrop-filter:blur(20px) saturate(160%);box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 0 1px rgba(59,130,246,.1);white-space:nowrap;overflow-x:auto;max-width:calc(100vw - 32px)}
.floatnav::-webkit-scrollbar{height:0}
.nav-logo-mini{display:flex;align-items:center;gap:6px;padding:4px 12px 4px 8px;border-right:1px solid var(--border);margin-right:4px;flex-shrink:0;text-decoration:none}
.nav-logo-mini img{width:20px;height:20px;object-fit:contain}
.nav-logo-mini span{font-size:.78rem;font-weight:700;color:var(--text)}
.npill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:100px;border:none;background:transparent;color:var(--dim);font-size:.75rem;font-weight:500;cursor:pointer;font-family:'Inter',system-ui,sans-serif;transition:all 180ms;white-space:nowrap;text-decoration:none}
.npill svg{width:12px;height:12px;flex-shrink:0}
.npill:hover{color:var(--text);background:var(--glasm)}
.npill.docs-active{color:#a78bfa;background:rgba(139,92,246,.12)}
.nav-actions{display:flex;align-items:center;gap:4px;margin-left:4px;padding-left:6px;border-left:1px solid var(--border);flex-shrink:0}
.nav-gh{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:100px;background:transparent;border:none;color:var(--dim);font-size:.72rem;font-weight:500;cursor:pointer;font-family:'Inter',system-ui,sans-serif;transition:all 180ms;text-decoration:none;white-space:nowrap}
.nav-gh:hover{color:var(--text);background:var(--glasm)}
.nav-gh svg{width:13px;height:13px;flex-shrink:0}
.nav-deploy{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:100px;background:var(--blue);border:none;color:#fff;font-size:.72rem;font-weight:600;cursor:pointer;font-family:'Inter',system-ui,sans-serif;transition:all 180ms;text-decoration:none;white-space:nowrap}
.nav-deploy:hover{background:#2563eb;box-shadow:0 0 14px rgba(59,130,246,.45)}
.nav-deploy svg{width:12px;height:12px;flex-shrink:0}

.docs-page{max-width:1200px;margin:0 auto;padding:80px 24px 60px;width:100%}
.docs-header{margin-bottom:28px}
.stag{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--purple);display:flex;align-items:center;gap:6px;margin-bottom:8px}
.stag::before{content:'';width:14px;height:2px;background:var(--purple);border-radius:1px}
.docs-title{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:900;letter-spacing:-.03em;margin-bottom:6px}
.docs-sub{font-size:.9rem;color:var(--dim);line-height:1.65}

.ver-bar{display:flex;align-items:center;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.ver-label{font-size:.67rem;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.08em;flex-shrink:0}
.ver-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:100px;font-size:.74rem;font-weight:600;border:1px solid var(--border);background:var(--glass);color:var(--dim);cursor:pointer;font-family:'Inter',system-ui,sans-serif;transition:all 150ms;white-space:nowrap}
.ver-btn:hover{background:var(--glasm);color:var(--text);border-color:var(--borhi)}
.ver-btn.active{background:rgba(139,92,246,.14);border-color:rgba(139,92,246,.4);color:#a78bfa}
.ver-badge{font-size:.58rem;padding:1px 5px;border-radius:3px;background:rgba(34,197,94,.15);color:var(--green);font-weight:700;margin-left:2px}

.docs-layout{display:grid;grid-template-columns:220px 1fr;gap:28px;align-items:start}
.docs-sidebar{position:sticky;top:74px;background:var(--glass);border:1px solid var(--border);border-radius:14px;backdrop-filter:blur(10px);overflow:hidden}
.dsb-inner{padding:18px 0}
.dsb-section{padding:0 14px}
.dsb-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);padding:10px 8px 5px;display:block}
.dsb-link{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;font-size:.78rem;font-weight:500;color:var(--dim);text-decoration:none;cursor:pointer;transition:all 150ms;margin-bottom:1px;border:none;background:transparent;font-family:'Inter',system-ui,sans-serif;width:100%;text-align:left}
.dsb-link svg{width:13px;height:13px;flex-shrink:0;opacity:.55}
.dsb-link:hover{background:var(--glasm);color:var(--text)}
.dsb-link:hover svg{opacity:.8}
.dsb-link.active{background:rgba(139,92,246,.1);color:#a78bfa;font-weight:600}
.dsb-link.active svg{opacity:1;color:#a78bfa}
.dsb-divider{height:1px;background:var(--border);margin:8px 14px}

.mob-nav-toggle{display:none;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--glass);border:1px solid var(--border);border-radius:10px;cursor:pointer;margin-bottom:16px;font-family:'Inter',system-ui,sans-serif;width:100%}
.mob-nav-toggle-left{display:flex;align-items:center;gap:8px;font-size:.75rem;color:var(--dim);font-weight:600}
.mob-nav-toggle-left svg{width:13px;height:13px}
.mob-nav-toggle-right{display:flex;align-items:center;gap:8px}
.mob-active-page{font-size:.75rem;font-weight:700;color:#a78bfa}
.mob-chevron{width:14px;height:14px;color:var(--faint);transition:transform 200ms;flex-shrink:0}
.mob-nav-toggle.open .mob-chevron{transform:rotate(180deg)}
.mob-nav-drawer{display:none;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 0 14px;margin-bottom:16px}
.mob-nav-drawer.open{display:block}

.docs-content{min-width:0}
.doc-breadcrumb{display:flex;align-items:center;gap:6px;font-size:.7rem;color:var(--faint);margin-bottom:16px;flex-wrap:wrap}
.doc-breadcrumb a{color:var(--dim);text-decoration:none}
.doc-breadcrumb a:hover{color:var(--text)}
.doc-breadcrumb .sep{color:var(--faint)}
.doc-breadcrumb .current{color:var(--text);font-weight:600}

.tab-panel{display:none}
.tab-panel.active{display:block}

.ch-card{background:var(--glass);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;transition:border-color 180ms}
.ch-card:hover{border-color:var(--borhi)}
.ch-header{display:flex;align-items:center;gap:12px;padding:15px 18px;cursor:pointer;user-select:none;width:100%;background:transparent;border:none;font-family:'Inter',system-ui,sans-serif;color:inherit;text-align:left}
.ch-ver{font-size:.95rem;font-weight:800;letter-spacing:-.02em}
.ch-date{font-size:.68rem;color:var(--faint);font-family:'JetBrains Mono',monospace;margin-top:2px}
.ch-tag{font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:auto;flex-shrink:0}
.ch-tag.latest{background:rgba(34,197,94,.14);color:var(--green);border:1px solid rgba(34,197,94,.28)}
.ch-tag.minor{background:rgba(59,130,246,.12);color:var(--blue);border:1px solid rgba(59,130,246,.25)}
.ch-tag.patch{background:rgba(71,85,105,.14);color:var(--faint);border:1px solid rgba(71,85,105,.28)}
.ch-chevron{width:15px;height:15px;color:var(--faint);transition:transform 200ms;flex-shrink:0}
.ch-card.open .ch-chevron{transform:rotate(180deg)}
.ch-body{padding:0 18px 16px;display:none}
.ch-card.open .ch-body{display:block}
.ch-group{margin-bottom:14px}
.ch-group-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--blue);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.ch-group-title.fix{color:var(--green)}
.ch-group-title::before{content:'';width:10px;height:2px;border-radius:1px;background:currentColor}
.ch-items{list-style:none;display:flex;flex-direction:column;gap:5px}
.ch-items li{font-size:.79rem;color:var(--dim);padding-left:14px;position:relative;line-height:1.55}
.ch-items li::before{content:'–';position:absolute;left:0;color:var(--faint)}
.ch-items li strong{color:var(--text);font-weight:600}
.ch-items li code{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--cyan);background:rgba(6,182,212,.1);padding:1px 4px;border-radius:3px}
.ch-docker{margin-top:10px}
.ch-docker-toggle{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;color:var(--faint);cursor:pointer;padding:4px 10px;border-radius:6px;background:var(--glasm);border:1px solid var(--border);font-family:'Inter',system-ui,sans-serif;transition:all 150ms}
.ch-docker-toggle:hover{color:var(--text)}
.ch-docker-body{display:none;margin-top:8px;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:.74rem;color:var(--dim);line-height:1.7;font-family:'JetBrains Mono',monospace;white-space:pre-wrap;overflow-x:auto}
.ch-docker-body.open{display:block}

.skeleton{background:linear-gradient(90deg,var(--glass) 25%,var(--glasm) 50%,var(--glass) 75%);background-size:400% 100%;animation:shimmer 1.4s ease infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
.skel-card{height:58px;margin-bottom:10px;border-radius:12px}

.doc-section-title{font-size:1.2rem;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.doc-section-sub{font-size:.85rem;color:var(--dim);line-height:1.65;margin-bottom:20px}
.step-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.step-item{display:flex;gap:14px;padding:14px 18px;border-radius:12px;background:var(--glass);border:1px solid var(--border)}
.step-num{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--blue));display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;color:#fff;flex-shrink:0;min-width:30px}
.step-title{font-size:.86rem;font-weight:700;margin-bottom:3px}
.step-desc{font-size:.76rem;color:var(--dim);line-height:1.6}
.step-desc code{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--cyan);background:rgba(6,182,212,.1);padding:1px 4px;border-radius:3px}
.cb{background:rgba(0,0,0,.55);border:1px solid rgba(59,130,246,.18);border-radius:10px;overflow:hidden;margin-bottom:14px}
.cb-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(59,130,246,.1)}
.cb-bar span{font-size:.63rem;font-weight:600;color:var(--faint);font-family:'JetBrains Mono',monospace}
.cb-copy{font-size:.65rem;padding:3px 9px;border-radius:4px;background:transparent;border:1px solid var(--border);color:var(--dim);cursor:pointer;font-family:'Inter',system-ui,sans-serif;transition:all 150ms}
.cb-copy:hover{background:var(--glasm);color:var(--text)}
.cb-body{padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:.75rem;line-height:1.85;overflow-x:auto;white-space:pre;color:var(--dim)}
.cb-body .ck{color:var(--cyan)}.cb-body .cs{color:var(--green)}.cb-body .cc{color:var(--faint)}.cb-body .cm{color:var(--amber)}
.doc-table{width:100%;border-collapse:collapse;font-size:.8rem;margin-bottom:16px}
.doc-table th{padding:9px 12px;text-align:left;font-weight:700;font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);border-bottom:1px solid var(--border)}
.doc-table td{padding:10px 12px;border-bottom:1px solid rgba(59,130,246,.05);vertical-align:middle}
.doc-table tr:last-child td{border-bottom:none}
.doc-table tr:hover td{background:rgba(255,255,255,.02)}
.doc-table .y{color:var(--green);font-weight:600}.doc-table .n{color:var(--red)}.doc-table .p{color:var(--amber)}
.alert-info{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:12px 16px;font-size:.78rem;color:var(--dim);line-height:1.6;margin-bottom:14px}
.alert-info strong{color:var(--blue)}

.inst-platform-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.inst-ptab{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:10px;border:1px solid var(--border);background:var(--glass);color:var(--dim);font-size:.81rem;font-weight:600;cursor:pointer;font-family:'Inter',system-ui,sans-serif;transition:all 150ms}
.inst-ptab:hover{background:var(--glasm);color:var(--text)}
.inst-ptab.active{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.4);color:var(--blue)}
.inst-ptab .ptab-icon{font-size:1rem;line-height:1}
.inst-pnl{display:none}.inst-pnl.active{display:block}
.inst-variant-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;padding:10px 12px;background:var(--glass);border:1px solid var(--border);border-radius:10px}
.inst-vchip{display:inline-flex;align-items:center;padding:5px 12px;border-radius:6px;font-size:.73rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:'Inter',system-ui,sans-serif;transition:all 150ms;white-space:nowrap}
.inst-vchip:hover{background:var(--glasm);color:var(--text)}
.inst-vchip.active{background:rgba(59,130,246,.14);border-color:rgba(59,130,246,.4);color:var(--blue)}
.inst-vchip.full{color:var(--purple)}.inst-vchip.full.active{background:rgba(139,92,246,.14);border-color:rgba(139,92,246,.4);color:var(--purple)}
.inst-vpnl{display:none}.inst-vpnl.active{display:block}
.inst-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.inst-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:.67rem;font-weight:700;border:1px solid}
.inst-badge.b{background:rgba(59,130,246,.1);color:var(--blue);border-color:rgba(59,130,246,.28)}
.inst-badge.p{background:rgba(139,92,246,.1);color:var(--purple);border-color:rgba(139,92,246,.28)}
.inst-badge.a{background:rgba(245,158,11,.1);color:var(--amber);border-color:rgba(245,158,11,.28)}
.inst-sep{display:flex;align-items:center;gap:10px;margin:24px 0 14px;font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--faint)}
.inst-sep::after{content:'';flex:1;height:1px;background:var(--border)}
.lang-bar{display:flex;gap:3px;flex-shrink:0}
.lang-btn{padding:3px 9px;border-radius:6px;border:1px solid var(--border);background:var(--glass);color:var(--dim);font-size:.68rem;font-weight:700;cursor:pointer;font-family:'Inter',system-ui,sans-serif;transition:all 150ms;letter-spacing:.04em}
.lang-btn:hover{background:var(--glasm);color:var(--text)}
.lang-btn.active{background:rgba(139,92,246,.14);border-color:rgba(139,92,246,.4);color:#a78bfa}
.empty-state{text-align:center;padding:48px 24px;color:var(--faint)}
.empty-state svg{width:40px;height:40px;margin:0 auto 12px;opacity:.4;display:block}
.empty-state p{font-size:.85rem;line-height:1.6}
.empty-state a{color:var(--blue);text-decoration:none}
.empty-state a:hover{text-decoration:underline}

.docs-footer{border-top:1px solid var(--border);margin-top:48px;padding-top:24px;padding-bottom:32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.docs-footer-left{font-size:.76rem;color:var(--faint)}
.docs-footer-right{display:flex;gap:14px}
.docs-footer-right a{font-size:.76rem;color:var(--faint);text-decoration:none;transition:color 150ms}
.docs-footer-right a:hover{color:var(--text)}

.mob-bottomnav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(7,11,20,.95);border-top:1px solid var(--border);padding:7px 0 max(10px,env(safe-area-inset-bottom));backdrop-filter:blur(12px);z-index:100}
.mob-bottomnav-inner{display:flex;justify-content:space-around;max-width:480px;margin:0 auto}
.mob-bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:2px 10px;color:var(--faint);font-size:.56rem;font-weight:600;cursor:pointer;text-decoration:none;font-family:'Inter',system-ui,sans-serif;transition:color 150ms;letter-spacing:.02em}
.mob-bnav-item svg{width:18px;height:18px}
.mob-bnav-item.active{color:#a78bfa}

@media(max-width:768px){
  .docs-layout{grid-template-columns:1fr}
  .docs-sidebar{display:none}
  .mob-nav-toggle{display:flex}
  .mob-bottomnav{display:block}
  .docs-page{padding:72px 16px 80px}
  .floatnav .npill span{display:none}
  .nav-deploy span{display:none}
  .nav-gh span{display:none}
  .ver-bar{flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;-webkit-overflow-scrolling:touch}
  .ver-bar::-webkit-scrollbar{display:none}
  .ver-label{display:none}
}
@media(max-width:580px){.nav-gh span{display:none}}
@media(prefers-reduced-motion:reduce){.skeleton{animation:none}.ch-chevron{transition:none}}
</style>
</head>

<template id="tpl-quickstart">
  <div class="doc-section-title" data-i18n="qs.title">Quick Start</div>
  <div class="doc-section-sub" data-i18n="qs.sub">Run Nexspence locally in under 2 minutes using Docker Compose.</div>
  <div class="step-list">
    <div class="step-item">
      <div class="step-num">01</div>
      <div><div class="step-title" data-i18n="qs.s1.title">Download the latest release</div><div class="step-desc" data-i18n="qs.s1.desc">Go to <a href="https://github.com/skensell201/nexspence/releases/latest" target="_blank" rel="noopener" style="color:var(--blue)">GitHub Releases</a>, download <code>nexspence-vX.Y.Z.zip</code> and unpack it.</div></div>
    </div>
    <div class="step-item">
      <div class="step-num">02</div>
      <div><div class="step-title" data-i18n="qs.s2.title">Configure</div><div class="step-desc" data-i18n="qs.s2.desc">Copy <code>config.yaml.example</code> → <code>config.yaml</code> and set a strong <code>admin_password</code> and <code>jwt_secret</code>.</div></div>
    </div>
    <div class="step-item">
      <div class="step-num">03</div>
      <div><div class="step-title" data-i18n="qs.s3.title">Start the stack</div><div class="step-desc" data-i18n="qs.s3.desc"><code>docker compose up -d</code> — waits for PostgreSQL, runs migrations, serves the UI at <code>http://localhost:8081</code>.</div></div>
    </div>
  </div>
  <div class="cb">
    <div class="cb-bar"><span>shell</span><button type="button" class="cb-copy" onclick="copyCode(this)">Copy</button></div>
    <div class="cb-body"><span class="cc"># Unpack the release zip</span>
unzip nexspence-vX.Y.Z.zip &amp;&amp; cd nexspence-vX.Y.Z

<span class="cc"># Config</span>
cp config.yaml.example config.yaml
<span class="cc"># Edit config.yaml: set admin_password + jwt_secret</span>

<span class="cc"># Launch</span>
docker compose up -d

<span class="cc"># Open UI</span>
open http://localhost:8081  <span class="cc"># default login: admin / admin123</span></div>
  </div>
  <div class="alert-info" data-i18n="qs.note"><strong>Note:</strong> Change the default password immediately after first login. The bootstrap admin credentials are set in <code>config.yaml</code> under the <code>bootstrap</code> key.</div>
</template>

<template id="tpl-repositories">
  <div class="doc-section-title" data-i18n="repo.title">Repositories</div>
  <div class="doc-section-sub" data-i18n="repo.sub">Nexspence organises artifacts into repositories. Each repository has a type (Hosted, Proxy, or Group) and a format (Maven, Docker, npm, etc.).</div>

  <div class="inst-sep" data-i18n="repo.types.sep">Repository Types</div>
  <div class="step-list">
    <div class="step-item">
      <div class="step-num" style="background:linear-gradient(135deg,#22c55e,#16a34a)">H</div>
      <div>
        <div class="step-title" data-i18n="repo.hosted.title">Hosted</div>
        <div class="step-desc" data-i18n="repo.hosted.desc">Stores artifacts you publish directly. Use for internal builds, release binaries, private packages. Supports upload via CI/CD pipelines.</div>
      </div>
    </div>
    <div class="step-item">
      <div class="step-num" style="background:linear-gradient(135deg,#f59e0b,#d97706)">P</div>
      <div>
        <div class="step-title" data-i18n="repo.proxy.title">Proxy</div>
        <div class="step-desc" data-i18n="repo.proxy.desc">Caches artifacts from a remote registry (Maven Central, npmjs, PyPI, Docker Hub, etc.). First request fetches from upstream; subsequent requests serve from cache. Reduces bandwidth and provides availability even if upstream is down.</div>
      </div>
    </div>
    <div class="step-item">
      <div class="step-num" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed)">G</div>
      <div>
        <div class="step-title" data-i18n="repo.group.title">Group</div>
        <div class="step-desc" data-i18n="repo.group.desc">Aggregates multiple repositories (hosted + proxy) under one URL. Clients use a single endpoint; Nexspence searches members in order and returns the first match. Ideal for giving developers one URL for all dependencies.</div>
      </div>
    </div>
  </div>

  <div class="inst-sep" data-i18n="repo.create.sep">Creating a Repository</div>
  <div class="step-list">
    <div class="step-item"><div class="step-num">01</div><div><div class="step-title" data-i18n="repo.create.s1.title">Open the Repositories page</div><div class="step-desc" data-i18n="repo.create.s1.desc">Navigate to <strong>Repositories</strong> in the sidebar. Click the <strong>+ Create</strong> button in the top-right corner.</div></div></div>
    <div class="step-item"><div class="step-num">02</div><div><div class="step-title" data-i18n="repo.create.s2.title">Choose type and format</div><div class="step-desc" data-i18n="repo.create.s2.desc">Select the repository type (Hosted / Proxy / Group) and format (Maven, npm, Docker, etc.) in the wizard. The name must be unique and URL-safe.</div></div></div>
    <div class="step-item"><div class="step-num">03</div><div><div class="step-title" data-i18n="repo.create.s3.title">Configure format-specific settings</div><div class="step-desc" data-i18n="repo.create.s3.desc">For <strong>Proxy</strong>: enter the upstream Remote URL (e.g. <code>https://registry.npmjs.org</code>). For <strong>Group</strong>: select member repositories in order. For all types: optionally assign a blob store and cleanup policy.</div></div></div>
    <div class="step-item"><div class="step-num">04</div><div><div class="step-title" data-i18n="repo.create.s4.title">Use the repository URL</div><div class="step-desc" data-i18n="repo.create.s4.desc">After creation the URL is shown on the repository card: <code>http://localhost:8081/repository/{name}/</code>. Point your build tool at this URL.</div></div></div>
  </div>

  <div class="inst-sep" data-i18n="repo.urls.sep">Repository URL Patterns</div>
  <table class="doc-table">
    <thead><tr><th data-i18n="repo.urls.th.format">Format</th><th data-i18n="repo.urls.th.url">URL pattern</th><th data-i18n="repo.urls.th.notes">Notes</th></tr></thead>
    <tbody>
      <tr><td>Maven</td><td><code>/repository/{name}/</code></td><td data-i18n="repo.urls.maven">Use as <code>&lt;url&gt;</code> in <code>pom.xml</code> or <code>settings.xml</code></td></tr>
      <tr><td>npm</td><td><code>/repository/{name}/</code></td><td data-i18n="repo.urls.npm">Use as <code>registry</code> in <code>.npmrc</code></td></tr>
      <tr><td>PyPI</td><td><code>/repository/{name}/simple/</code></td><td data-i18n="repo.urls.pypi">Use as <code>index-url</code> in <code>pip.conf</code></td></tr>
      <tr><td>Docker</td><td><code>localhost:5000/{name}</code></td><td data-i18n="repo.urls.docker">Registry port 5000, image name includes repo</td></tr>
      <tr><td>Helm</td><td><code>/repository/{name}/</code></td><td data-i18n="repo.urls.helm">Add with <code>helm repo add</code></td></tr>
      <tr><td>Go</td><td><code>/repository/{name}/</code></td><td data-i18n="repo.urls.go">Set as <code>GOPROXY</code></td></tr>
      <tr><td>NuGet</td><td><code>/repository/{name}/index.json</code></td><td data-i18n="repo.urls.nuget">v3 flat container endpoint</td></tr>
      <tr><td>Cargo</td><td><code>/repository/{name}/</code></td><td data-i18n="repo.urls.cargo">Sparse index endpoint</td></tr>
      <tr><td>Raw</td><td><code>/repository/{name}/</code></td><td data-i18n="repo.urls.raw">PUT/GET any path</td></tr>
    </tbody>
  </table>

  <div class="inst-sep" data-i18n="repo.anon.sep">Anonymous Access</div>
  <div class="alert-info" data-i18n="repo.anon.info">Enable <strong>Allow anonymous access</strong> on a repository to let unauthenticated users download artifacts. Write operations always require authentication. Configure globally in <strong>Admin → Security → Anonymous Access</strong> and per-repository in the repo settings.</div>
</template>

<template id="tpl-formats-guide">
  <div class="doc-section-title" data-i18n="fg.title">Format Setup Guides</div>
  <div class="doc-section-sub" data-i18n="fg.sub">How to configure your build tools and package managers to use Nexspence repositories. Replace <code>localhost:8081</code> with your server URL and <code>{repo}</code> with your repository name.</div>

  <!-- Maven -->
  <div class="inst-sep">Maven / Gradle</div>
  <p style="font-size:.8rem;color:var(--dim);margin-bottom:10px;line-height:1.6" data-i18n="fg.maven.desc">Add Nexspence as a mirror in <code>~/.m2/settings.xml</code> to route all dependency downloads through your proxy repository.</p>
  <div class="cb"><div class="cb-bar"><span>~/.m2/settings.xml</span><button type="button" class="cb-copy" onclick="copyCode(this)">Copy</button></div>
  <div class="cb-body">&lt;settings&gt;
  &lt;mirrors&gt;
    &lt;mirror&gt;
      &lt;id&gt;nexspence&lt;/id&gt;
      &lt;url&gt;http://localhost:8081/repository/maven-public/&lt;/url&gt;
      &lt;mirrorOf&gt;*&lt;/mirrorOf&gt;
    &lt;/mirror&gt;
  &lt;/mirrors&gt;
  &lt;servers&gt;
    &lt;server&gt;
      &lt;id&gt;nexspence&lt;/id&gt;
      &lt;username&gt;admin&lt;/username&gt;
      &lt;password&gt;admin123&lt;/password&gt;
    &lt;/server&gt;
  &lt;/servers&gt;
&lt;/settings&gt;</div></div>
  <div class="cb"><div class="cb-bar"><span>pom.xml — deploy</span><button type="button" class="cb-copy" onclick="copyCode(this)">Copy</button></div>
  <div class="cb-body">&lt;distributionManagement&gt;
  &lt;repository&gt;
    &lt;id&gt;nexspence&lt;/id&gt;
    &lt;url&gt;http://localhost:8081/repository/maven-releases/&lt;/url&gt;
  &lt;/repository&gt;
  &lt;snapshotRepository&gt;
    &lt;id&gt;nexspence&lt;/id&gt;
    &lt;url&gt;http://localhost:8081/repository/maven-snapshots/&lt;/url&gt;
  &lt;/snapshotRepository&gt;
&lt;/distributionManagement&gt;</div></div>

  <!-- npm -->
  <div class="inst-sep">npm / yarn</div>
  <div class="cb"><div class="cb-bar"><span>.npmrc</span><button type="button" class="cb-copy" onclick="copyCode(this)">Copy</button></div>
  <div class="cb-body">registry=http://localhost:8081/repository/npm-public/
//localhost:8081/repository/npm-public/:_auth=YWRtaW46YWRtaW4xMjM=
//localhost:8081/repository/npm-public/:always-auth=true</div></div>
  <div class="alert-info" data-i18n="fg.npm.auth.note"><strong>Auth token:</strong> <code>_auth</code> is base64 of <code>username:password</code>. Generate: <code>echo -n "admin:admin123" | base64</code>. To publish: <code>npm publish --registry http://localhost:8081/repository/npm-hosted/</code></div>

  <!-- PyPI -->
  <div class="inst-sep">PyPI / pip</div>
  <div class="cb"><div class="cb-bar"><span>~/.config/pip/pip.conf</span><button type="button" class="cb-copy" onclick="copyCode(this)">Copy</button></div>
  <div class="cb-body">[global]
index-url = http://admin:admin123@localhost:8081/repository/pypi-proxy/simple/
trusted-host = localhost</div></div>
  <div class="cb"><div class="cb-bar"><span>publish with twine</span><button type="button" class="cb-copy" onclick="copyCode(this)">Copy</button></div>
  <div class="cb-body">twine upload \
  --repository-url http://localhost:8081/repository/pypi-hosted/ \
  --username admin --password admin123 \
  dist/*</div></div>

  <!-- Docker -->
  <div class="inst-sep">Docker / OCI</div>
  <div class="alert-info" data-i18n="fg.docker.insecure.note"><strong>HTTP registry:</strong> Add <code>"insecure-registries": ["localhost:5000"]</code> to Docker daemon config (<code>/etc/docker/daemon.json</code>) when using HTTP. Restart Docker after.</div>
  <div class="cb"><div class="cb-bar"><span>shell</span><button type="button" class="cb-copy" onclick="copyCode(this)">Copy</button></div>
  <div class="cb-body"><span class="cc"># Login</span>
docker login localhost:5000 -u admin -p admin123

<span class="cc"># Pull through proxy</span>
docker pull localhost:5000/docker-proxy/library/nginx:latest

<span class="cc"># Push to hosted</span>
docker tag myimage:1.0 localhost:5000/docker-hosted/myimage:1.0
docker push localhost:5000/docker-hosted/myimage:1.0</div></div>

  <!-- Helm -->
  <div class="inst-sep">Helm Charts</div>
  <div class="cb"><div class="cb-bar"><span>shell</span><button type="button" class="cb-copy" onclick="copyCode(this)">Copy</button></div>
  <div class="cb-body"><span class="cc"># Add repository</span>
helm repo add nexspence \
  http://localhost:8081/repository/helm-public/ \
  --username admin --password admin123

helm repo update

<span class="cc"># Search and install</span>
helm search repo nexspence/
helm install my-release nexspence/my-chart

<span class="cc"># Push chart (requires helm-push plugin)</span>
helm plugin install https://github.com/chartmuseum/helm-push
helm cm-push my-chart/ nexspence</div></div>

  <!-- Go -->
  <div class="inst-sep">Go Modules</div>
  <div class="cb"><div class="cb-bar"><span>shell / go.env</span><button type="button" class="cb-copy" onclick="copyCode(this)">Copy</button></div>
  <div class="cb-body"><span class="cc"># Set GOPROXY</span>
go env -w GOPROXY=http://localhost:8081/repository/go-proxy/|direct
go env -w GONOSUMCHECK=localhost:8081

<span class="cc"># Use in project</span>
go get github.com/some/module@v1.2.3</div></div>

  <!-- Cargo -->
  <div class="inst-sep">Cargo (Rust)</div>
  <div class="cb"><div class="cb-bar"><span>~/.cargo/config.toml</span><button type="button" class="cb-copy" onclick="copyCode(this)">Copy</button></div>
  <div class="cb-body">[source.crates-io]
replace-with = "nexspence"

[source.nexspence]
registry = "sparse+http://localhost:8081/repository/cargo-proxy/"

[net]
git-fetch-with-cli = true</div></div>

  <!-- NuGet -->
  <div class="inst-sep">NuGet (.NET)</div>
  <div class="cb"><div class="cb-bar"><span>shell</span><button type="button" class="cb-copy" onclick="copyCode(this)">Copy</button></div>
  <div class="cb-body"><span class="cc"># Add source</span>
dotnet nuget add source \
  http://localhost:8081/repository/nuget-public/index.json \
  --name nexspence \
  --username admin \
  --password admin123 \
  --store-password-in-clear-text

<span class="cc"># Push package</span>
dotnet nuget push mypackage.nupkg \
  --source http://localhost:8081/repository/nuget-hosted/ \
  --api-key admin123</div></div>

  <!-- Raw -->
  <div class="inst-sep">Raw Files</div>
  <div class="cb"><div class="cb-bar"><span>curl</span><button type="button" class="cb-copy" onclick="copyCode(this)">Copy</button></div>
  <div class="cb-body"><span class="cc"># Upload a file</span>
curl -u admin:admin123 \
  -T myfile.tar.gz \
  http://localhost:8081/repository/raw-hosted/releases/myfile.tar.gz

<span class="cc"># Download</span>
curl -u admin:admin123 \
  -O http://localhost:8081/repository/raw-hosted/releases/myfile.tar.gz</div></div>
</template>

<template id="tpl-browse-search">
  <div class="doc-section-title" data-i18n="bs.title">Browse &amp; Search</div>
  <div class="doc-section-sub" data-i18n="bs.sub">Find, inspect, and download artifacts stored in Nexspence repositories.</div>

  <div class="inst-sep" data-i18n="bs.browse.sep">Browse</div>
  <div class="step-list">
    <div class="step-item"><div class="step-num">01</div><div><div class="step-title" data-i18n="bs.browse.s1.title">Open Browse</div><div class="step-desc" data-i18n="bs.browse.s1.desc">Click <strong>Browse</strong> in the sidebar. Select a repository from the dropdown on the left.</div></div></div>
    <div class="step-item"><div class="step-num">02</div><div><div class="step-title" data-i18n="bs.browse.s2.title">Navigate the tree</div><div class="step-desc" data-i18n="bs.browse.s2.desc">For most formats a file tree is shown. For Docker repositories a two-column view shows image names on the left and tags on the right.</div></div></div>
    <div class="step-item"><div class="step-num">03</div><div><div class="step-title" data-i18n="bs.browse.s3.title">Inspect a component</div><div class="step-desc" data-i18n="bs.browse.s3.desc">Click any file or component to open a detail panel with metadata (size, SHA-256, upload date), download link, and usage examples for common tools.</div></div></div>
  </div>

  <div class="inst-sep" data-i18n="bs.search.sep">Search</div>
  <div class="step-list">
    <div class="step-item"><div class="step-num">01</div><div><div class="step-title" data-i18n="bs.search.s1.title">Open Search</div><div class="step-desc" data-i18n="bs.search.s1.desc">Click <strong>Search</strong> in the sidebar. Enter a keyword in the search box — matches component names, group IDs, and artifact IDs.</div></div></div>
    <div class="step-item"><div class="step-num">02</div><div><div class="step-title" data-i18n="bs.search.s2.title">Filter by format or repository</div><div class="step-desc" data-i18n="bs.search.s2.desc">Use the <strong>Format</strong> and <strong>Repository</strong> dropdowns to narrow results. You can also filter by tag.</div></div></div>
    <div class="step-item"><div class="step-num">03</div><div><div class="step-title" data-i18n="bs.search.s3.title">Use the API</div><div class="step-desc" data-i18n="bs.search.s3.desc">Search is also available via the REST API for CI/CD integration.</div></div></div>
  </div>
  <div class="cb"><div class="cb-bar"><span>curl — search API</span><button type="button" class="cb-copy" onclick="copyCode(this)">Copy</button></div>
  <div class="cb-body"><span class="cc"># Search by keyword</span>
curl -u admin:admin123 \
  "http://localhost:8081/service/rest/v1/search?q=mylib"

<span class="cc"># Filter by format and repository</span>
curl -u admin:admin123 \
  "http://localhost:8081/service/rest/v1/search?format=maven2&repository=maven-releases&q=spring"

<span class="cc"># List all components in a repository</span>
curl -u admin:admin123 \
  "http://localhost:8081/service/rest/v1/components?repository=npm-hosted"</div></div>
</template>

<template id="tpl-users">
  <div class="doc-section-title" data-i18n="usr.title">Users &amp; API Tokens</div>
  <div class="doc-section-sub" data-i18n="usr.sub">Manage user accounts, passwords, and programmatic API tokens for CI/CD pipelines.</div>

  <div class="inst-sep" data-i18n="usr.users.sep">User Management</div>
  <div class="step-list">
    <div class="step-item"><div class="step-num">01</div><div><div class="step-title" data-i18n="usr.create.title">Create a user</div><div class="step-desc" data-i18n="usr.create.desc">Go to <strong>Admin → Security → Users</strong>. Click <strong>+ Create User</strong>. Fill in username, email, first/last name, and initial password. Assign roles immediately or later.</div></div></div>
    <div class="step-item"><div class="step-num">02</div><div><div class="step-title" data-i18n="usr.roles.title">Assign roles</div><div class="step-desc" data-i18n="usr.roles.desc">Open a user and click <strong>Assign Roles</strong>. Select roles from the transfer list. The built-in <code>nx-admin</code> role grants full access; custom roles control per-repository access via privileges.</div></div></div>
    <div class="step-item"><div class="step-num">03</div><div><div class="step-title" data-i18n="usr.ldap.title">LDAP / Active Directory</div><div class="step-desc" data-i18n="usr.ldap.desc">Configure LDAP in <code>config.yaml</code> under the <code>ldap</code> section. Users are provisioned on first login (JIT). Groups map to Nexspence roles via <code>role_mappings</code>.</div></div></div>
  </div>
  <div class="cb"><div class="cb-bar"><span>curl — create user via API</span><button type="button" class="cb-copy" onclick="copyCode(this)">Copy</button></div>
  <div class="cb-body">curl -u admin:admin123 -X POST \
  http://localhost:8081/service/rest/v1/security/users \
  -H "Content-Type: application/json" \
  -d '{
    "userId": "alice",
    "firstName": "Alice",
    "lastName": "Smith",
    "emailAddress": "alice@example.com",
    "password": "secret",
    "status": "active",
    "roles": ["nx-anonymous"]
  }'</div></div>

  <div class="inst-sep" data-i18n="usr.tokens.sep">API Tokens</div>
  <div class="step-list">
    <div class="step-item"><div class="step-num">01</div><div><div class="step-title" data-i18n="usr.token.create.title">Create a token</div><div class="step-desc" data-i18n="usr.token.create.desc">Open your profile (click your username in the bottom-left). Go to <strong>API Tokens</strong> tab. Click <strong>Generate Token</strong>. Set an optional expiry. The token is shown <strong>once</strong> — copy it immediately.</div></div></div>
    <div class="step-item"><div class="step-num">02</div><div><div class="step-title" data-i18n="usr.token.use.title">Use the token</div><div class="step-desc" data-i18n="usr.token.use.desc">Tokens start with <code>nxs_</code>. Use as Bearer token or as the password in HTTP Basic auth (username = your username, password = token).</div></div></div>
  </div>
  <div class="cb"><div class="cb-bar"><span>curl — using an API token</span><button type="button" class="cb-copy" onclick="copyCode(this)">Copy</button></div>
  <div class="cb-body"><span class="cc"># Bearer auth</span>
curl -H "Authorization: Bearer nxs_abc123..." \
  http://localhost:8081/service/rest/v1/repositories

<span class="cc"># Basic auth (username + token as password)</span>
curl -u admin:nxs_abc123... \
  http://localhost:8081/service/rest/v1/components?repository=maven-releases</div></div>
  <div class="alert-info" data-i18n="usr.token.limit.note"><strong>Token expiry:</strong> Maximum lifetime is controlled by <code>auth.token_max_days</code> in <code>config.yaml</code> (default 180 days). Tokens are hashed (SHA-256) — the plaintext is never stored.</div>
</template>

<template id="tpl-rbac">
  <div class="doc-section-title" data-i18n="rbac.title">Roles &amp; Privileges</div>
  <div class="doc-section-sub" data-i18n="rbac.sub">Nexspence uses a three-layer access control model: Content Selectors → Privileges → Roles → Users.</div>

  <div class="inst-sep" data-i18n="rbac.model.sep">Access Control Model</div>
  <div class="step-list">
    <div class="step-item">
      <div class="step-num" style="background:linear-gradient(135deg,#06b6d4,#0891b2)">1</div>
      <div><div class="step-title" data-i18n="rbac.cs.title">Content Selector</div><div class="step-desc" data-i18n="rbac.cs.desc">A CEL expression that defines <em>which artifacts</em> the rule applies to. Variables available: <code>format</code>, <code>path</code>, <code>repository</code>. Example: <code>format == "maven2" &amp;&amp; path.startsWith("/com/example/")</code></div></div>
    </div>
    <div class="step-item">
      <div class="step-num" style="background:linear-gradient(135deg,#f59e0b,#d97706)">2</div>
      <div><div class="step-title" data-i18n="rbac.priv.title">Privilege</div><div class="step-desc" data-i18n="rbac.priv.desc">Binds a Content Selector to a permission. In Nexspence all user-created privileges are of type <code>repository-content-selector</code>. Create in <strong>Admin → Security → Privileges</strong>.</div></div>
    </div>
    <div class="step-item">
      <div class="step-num" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed)">3</div>
      <div><div class="step-title" data-i18n="rbac.role.title">Role</div><div class="step-desc" data-i18n="rbac.role.desc">A named set of privileges. Assign roles to users. The built-in <code>nx-admin</code> role grants full access to everything.</div></div>
    </div>
  </div>

  <div class="inst-sep" data-i18n="rbac.cel.sep">CEL Expression Examples</div>
  <table class="doc-table">
    <thead><tr><th data-i18n="rbac.cel.th.desc">What it matches</th><th data-i18n="rbac.cel.th.expr">CEL expression</th></tr></thead>
    <tbody>
      <tr><td data-i18n="rbac.cel.ex1.desc">All Maven artifacts</td><td><code>format == "maven2"</code></td></tr>
      <tr><td data-i18n="rbac.cel.ex2.desc">Specific Maven group</td><td><code>format == "maven2" &amp;&amp; path.startsWith("/com/example/")</code></td></tr>
      <tr><td data-i18n="rbac.cel.ex3.desc">All Docker images</td><td><code>format == "docker"</code></td></tr>
      <tr><td data-i18n="rbac.cel.ex4.desc">Specific repository</td><td><code>repository == "npm-releases"</code></td></tr>
      <tr><td data-i18n="rbac.cel.ex5.desc">All npm packages</td><td><code>format == "npm"</code></td></tr>
      <tr><td data-i18n="rbac.cel.ex6.desc">PyPI in specific repo</td><td><code>format == "pypi" &amp;&amp; repository == "pypi-releases"</code></td></tr>
      <tr><td data-i18n="rbac.cel.ex7.desc">Exclude snapshots</td><td><code>format == "maven2" &amp;&amp; !path.contains("SNAPSHOT")</code></td></tr>
    </tbody>
  </table>

  <div class="inst-sep" data-i18n="rbac.setup.sep">Setting Up Access Control</div>
  <div class="step-list">
    <div class="step-item"><div class="step-num">01</div><div><div class="step-title" data-i18n="rbac.setup.s1.title">Create a Content Selector</div><div class="step-desc" data-i18n="rbac.setup.s1.desc"><strong>Admin → Security → Content Selectors → + Create</strong>. Enter a name and a CEL expression. The preview shows matching artifacts.</div></div></div>
    <div class="step-item"><div class="step-num">02</div><div><div class="step-title" data-i18n="rbac.setup.s2.title">Create a Privilege</div><div class="step-desc" data-i18n="rbac.setup.s2.desc"><strong>Admin → Security → Privileges → + Create</strong>. Select the Content Selector you just created.</div></div></div>
    <div class="step-item"><div class="step-num">03</div><div><div class="step-title" data-i18n="rbac.setup.s3.title">Create a Role</div><div class="step-desc" data-i18n="rbac.setup.s3.desc"><strong>Admin → Security → Roles → + Create</strong>. Add the privilege to the role.</div></div></div>
    <div class="step-item"><div class="step-num">04</div><div><div class="step-title" data-i18n="rbac.setup.s4.title">Assign the Role to a User</div><div class="step-desc" data-i18n="rbac.setup.s4.desc"><strong>Admin → Security → Users</strong>. Open the user, click <strong>Assign Roles</strong>, add the role.</div></div></div>
  </div>
</template>

<template id="tpl-cleanup">
  <div class="doc-section-title" data-i18n="cl.title">Cleanup Policies</div>
  <div class="doc-section-sub" data-i18n="cl.sub">Automatically remove old or unused artifacts to reclaim storage space.</div>

  <div class="inst-sep" data-i18n="cl.criteria.sep">Cleanup Criteria</div>
  <table class="doc-table">
    <thead><tr><th data-i18n="cl.th.criterion">Criterion</th><th data-i18n="cl.th.desc">Description</th></tr></thead>
    <tbody>
      <tr><td data-i18n="cl.age.label">Published before</td><td data-i18n="cl.age.desc">Remove artifacts published more than N days ago.</td></tr>
      <tr><td data-i18n="cl.last.label">Last downloaded before</td><td data-i18n="cl.last.desc">Remove artifacts not downloaded in the last N days.</td></tr>
      <tr><td data-i18n="cl.retain.label">Retain N versions</td><td data-i18n="cl.retain.desc">Keep only the N newest versions of each component. All older versions are eligible for removal.</td></tr>
    </tbody>
  </table>
  <div class="step-list">
    <div class="step-item"><div class="step-num">01</div><div><div class="step-title" data-i18n="cl.s1.title">Create a policy</div><div class="step-desc" data-i18n="cl.s1.desc">Go to <strong>Admin → Cleanup Policies</strong>. Click <strong>+ Create</strong>. Choose format scope (<code>*</code> for all formats or a specific one), set criteria, and optionally set a cron schedule.</div></div></div>
    <div class="step-item"><div class="step-num">02</div><div><div class="step-title" data-i18n="cl.s2.title">Attach to repositories</div><div class="step-desc" data-i18n="cl.s2.desc">Open a repository settings (gear icon) and select one or more cleanup policies. Only artifacts in attached repositories are affected.</div></div></div>
    <div class="step-item"><div class="step-num">03</div><div><div class="step-title" data-i18n="cl.s3.title">Run now or wait for schedule</div><div class="step-desc" data-i18n="cl.s3.desc">On the policy card click <strong>Run Now</strong> to trigger an immediate dry-run (preview) or full run. The default global cron is <code>0 2 * * *</code> (2 AM daily).</div></div></div>
  </div>
  <div class="alert-info" data-i18n="cl.dryrun.note"><strong>Dry run:</strong> The first run shows what <em>would</em> be deleted without actually removing anything. Review the preview before enabling full deletion.</div>
</template>

<template id="tpl-webhooks">
  <div class="doc-section-title" data-i18n="wh.title">Webhooks</div>
  <div class="doc-section-sub" data-i18n="wh.sub">Receive HTTP POST callbacks when repository events occur. Use for CI/CD triggers, Slack notifications, audit systems, and more.</div>

  <div class="inst-sep" data-i18n="wh.events.sep">Events</div>
  <table class="doc-table">
    <thead><tr><th data-i18n="wh.th.event">Event</th><th data-i18n="wh.th.when">When</th></tr></thead>
    <tbody>
      <tr><td><code>artifact.published</code></td><td data-i18n="wh.ev.published">Artifact pushed to hosted or cached by proxy</td></tr>
      <tr><td><code>artifact.deleted</code></td><td data-i18n="wh.ev.deleted">Artifact deleted</td></tr>
      <tr><td><code>repo.created</code></td><td data-i18n="wh.ev.repo-created">Repository created</td></tr>
      <tr><td><code>repo.updated</code></td><td data-i18n="wh.ev.repo-updated">Repository configuration updated</td></tr>
      <tr><td><code>repo.deleted</code></td><td data-i18n="wh.ev.repo-deleted">Repository deleted</td></tr>
      <tr><td><code>proxy.error</code></td><td data-i18n="wh.ev.proxy-error">Proxy failed to fetch from upstream</td></tr>
    </tbody>
  </table>

  <div class="inst-sep" data-i18n="wh.setup.sep">Setting Up a Webhook</div>
  <div class="step-list">
    <div class="step-item"><div class="step-num">01</div><div><div class="step-title" data-i18n="wh.s1.title">Create a webhook</div><div class="step-desc" data-i18n="wh.s1.desc"><strong>Admin → Security → Webhooks → + Create</strong>. Enter a URL, select events to subscribe to, and optionally set a secret for HMAC-SHA256 signature verification.</div></div></div>
    <div class="step-item"><div class="step-num">02</div><div><div class="step-title" data-i18n="wh.s2.title">Test delivery</div><div class="step-desc" data-i18n="wh.s2.desc">Click the ⚡ button on the webhook card to send a test event. The response status and latency are shown inline.</div></div></div>
    <div class="step-item"><div class="step-num">03</div><div><div class="step-title" data-i18n="wh.s3.title">Verify the signature</div><div class="step-desc" data-i18n="wh.s3.desc">If a secret is set, each request carries an <code>X-Nexspence-Signature</code> header (HMAC-SHA256 of the body). Verify it on your receiver to reject forged requests.</div></div></div>
  </div>
  <div class="cb"><div class="cb-bar"><span>Python — verify HMAC signature</span><button type="button" class="cb-copy" onclick="copyCode(this)">Copy</button></div>
  <div class="cb-body">import hashlib, hmac

def verify(secret: str, body: bytes, header: str) -&gt; bool:
    expected = "sha256=" + hmac.new(
        secret.encode(), body, hashlib.sha256
    ).hexdigest()
    return hmac.compare_digest(expected, header)</div></div>
  <div class="alert-info" data-i18n="wh.retry.note"><strong>Delivery:</strong> Webhooks are fired asynchronously (fire-and-forget). If your endpoint is unavailable, the event is not retried. Use a queue or durable receiver for critical integrations.</div>
</template>

<template id="tpl-install">

  <div class="doc-section-sub" data-i18n="inst.sub">Docker image: <code>ghcr.io/skensell201/nexspence:latest</code> — linux/amd64 and linux/arm64. Download the release zip from <a href="https://github.com/skensell201/nexspence/releases/latest" target="_blank" rel="noopener" style="color:var(--blue)">GitHub Releases</a>.</div>

        <span class="ptab-icon">🐳</span> Docker Compose
      </button>
      <button type="button" class="inst-ptab" onclick="installPlatform('k8s',this)">
        <span class="ptab-icon">☸️</span> Kubernetes / Helm
      </button>
    </div>

    <!-- ══ DOCKER ══ -->
    <div class="inst-pnl active" data-pnl="docker">
      <div class="inst-variant-row">
        <button type="button" class="inst-vchip active" onclick="installVariant('docker','std',this)" data-i18n="inst.v.std">Standard</button>
        <button type="button" class="inst-vchip" onclick="installVariant('docker','ha',this)" data-i18n="inst.v.ha">HA Cluster</button>
        <button type="button" class="inst-vchip" onclick="installVariant('docker','mon',this)" data-i18n="inst.v.mon">+ Monitoring</button>
        <button type="button" class="inst-vchip" onclick="installVariant('docker','sso',this)" data-i18n="inst.v.sso">+ Keycloak SSO</button>
        <button type="button" class="inst-vchip full" onclick="installVariant('docker','full',this)">⭐ <span data-i18n="inst.v.full">Full Stack</span></button>
      </div>

      <div class="inst-vpnl active" data-vpnl="docker-std">
        <div class="step-list">
          <div class="step-item"><div class="step-num">01</div><div><div class="step-title" data-i18n="inst.std.s1.title">Download &amp; configure</div><div class="step-desc" data-i18n="inst.std.s1.desc">Unpack the release zip. Copy <code>config.yaml.example</code> → <code>config.yaml</code>. Set <code>auth.jwt_secret</code> (min 32 chars) and <code>bootstrap.admin_password</code>.</div></div></div>
          <div class="step-item"><div class="step-num">02</div><div><div class="step-title" data-i18n="inst.std.s2.title">Start</div><div class="step-desc" data-i18n="inst.std.s2.desc">PostgreSQL starts first, Nexspence waits for it, runs migrations automatically, then serves the UI.</div></div></div>
        </div>
        <div class="cb"><div class="cb-bar"><span>shell</span><button type="button" class="cb-copy" onclick="copyCode(this)">Copy</button></div>
        <div class="cb-body">cp config.yaml.example config.yaml
<span class="cc"># edit config.yaml — set jwt_secret and admin_password</span>

docker compose up -d</div></div>
        <table class="doc-table">
          <thead><tr><th data-i18n="inst.std.th.svc">Service</th><th data-i18n="inst.std.th.url">URL</th><th data-i18n="inst.std.th.creds">Default credentials</th></tr></thead>
          <tbody>

            <tr><td>Docker registry</td><td><code>localhost:5000</code></td><td>same</td></tr>
            <tr><td>PostgreSQL</td><td><code>localhost:5437</code></td><td><code>nexspence / nexspence</code></td></tr>

        <div class="cb"><div class="cb-bar"><span>config.yaml</span><button type="button" class="cb-copy" onclick="copyCode(this)">Copy</button></div>

  <span class="ck">enabled</span>: <span class="cs">true</span>

        <div class="cb"><div class="cb-bar"><span>shell</span><button type="button" class="cb-copy" onclick="copyCode(this)">Copy</button></div>

   deploy/monitoring/prometheus-token
<span class="cc"># paste your nxs_* token</span>

docker compose --profile monitoring up -d

<span class="cc"># Grafana:     http://localhost:3000  (admin / admin)</span></div></div>
      </div>

      <div class="inst-vpnl" data-vpnl="docker-sso">
        <p style="font-size:.8rem;color:var(--dim);margin-bottom:12px;line-height:1.6" data-i18n="inst.sso.desc">Pre-configured Keycloak dev instance with the <code>nexspence</code> realm imported. "Sign in with Keycloak" appears on the login page automatically. Supports Keycloak, Google, Entra ID, and Okta.</p>

<span class="cc"># Test SSO user:   testuser / testpass  →  nx-admin role</span></div></div>
      </div>

      <div class="inst-vpnl" data-vpnl="docker-full">
        <div class="alert-info" style="background:rgba(139,92,246,.06);border-color:rgba(139,92,246,.2)" data-i18n="inst.full.alert"><strong style="color:var(--purple)">Full Stack</strong> — HA Cluster + Keycloak SSO + Prometheus/Grafana monitoring, all in one command.</div>
        <div class="inst-badges">
          <span class="inst-badge b">2 × Nexspence</span>
          <span class="inst-badge b">nginx LB</span>
          <span class="inst-badge b">PostgreSQL</span>
          <span class="inst-badge b">MinIO</span>
          <span class="inst-badge b">Redis</span>
          <span class="inst-badge p">Keycloak</span>
          <span class="inst-badge a">Prometheus</span>
          <span class="inst-badge a">Grafana</span>
        </div>
        <div class="step-list">
          <div class="step-item"><div class="step-num">01</div><div><div class="step-title" data-i18n="inst.full.s1.title">Enable Redis in config.yaml</div><div class="step-desc" data-i18n="inst.full.s1.desc"><code>redis.enabled: true</code> and <code>redis.addr: "redis:6379"</code></div></div></div>
          <div class="step-item"><div class="step-num">02</div><div><div class="step-title" data-i18n="inst.full.s2.title">Create a Prometheus token</div><div class="step-desc" data-i18n="inst.full.s2.desc">Start the stack once without monitoring, create an <code>nxs_*</code> API token in <strong>Security → API Tokens</strong>, then paste it into <code>deploy/monitoring/prometheus-token</code>.</div></div></div>

function parseReleaseBody(body){
  if(!body)return{features:[],fixes:[],dockerRaw:''};
  const lines=body.split('\n');
  let mode=null;
  const features=[],fixes=[];
  let dockerLines=[];
  for(const raw of lines){
    const line=raw.trim();
    if(/^#{1,4}\s+.*[Ff]eature/.test(line)){mode='features';continue}
    if(/^#{1,4}\s+.*[Bb]ug\s+[Ff]ix/.test(line)){mode='fixes';continue}
    if(/^#{1,4}\s+.*[Dd]ocker/.test(line)){mode='docker';continue}
    if(/^#{1,4}/.test(line)&&mode!=='docker'){mode=null;continue}
    if(mode==='docker'){dockerLines.push(raw);continue}
    if((mode==='features'||mode==='fixes')&&/^[-*]\s/.test(line)){
      const text=line.replace(/^[-*]\s+/,'').trim();
      if(text)(mode==='features'?features:fixes).push(text);
    }
  }
  return{features,fixes,dockerRaw:dockerLines.join('\n').trim()};
}

function inlineMd(text){
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>');
}

async function fetchReleases(){
  try{const c=sessionStorage.getItem(CACHE_KEY);if(c)return JSON.parse(c)}catch(_){}
  const res=await fetch(API_URL);
  if(!res.ok)throw new Error('GitHub API '+res.status);
  const data=await res.json();
  const releases=data.filter(r=>!r.draft&&r.tag_name).map((r,i)=>{
    const{features,fixes,dockerRaw}=parseReleaseBody(r.body);
    return{tag:r.tag_name,name:r.name||r.tag_name,date:r.published_at?r.published_at.slice(0,10):'',features,fixes,dockerRaw,isLatest:i===0};
  });
  try{sessionStorage.setItem(CACHE_KEY,JSON.stringify(releases))}catch(_){}
  return releases;
}

function renderVersionBar(releases,activeTag){
  const bar=document.getElementById('ver-bar');
  const seen=new Set();const minors=[];
  for(const r of releases){
    const minor=r.tag.replace(/^v/,'').split('.').slice(0,2).join('.');
    if(!seen.has(minor)){seen.add(minor);minors.push({minor,latest:r.tag,isLatest:r.isLatest});}
  }
  bar.innerHTML='<span class="ver-label">Version:</span>';
  for(const{minor,latest,isLatest}of minors){
    const btn=document.createElement('button');
    btn.type='button';
    btn.className='ver-btn'+(latest===activeTag?' active':'');
    btn.setAttribute('role','tab');
    btn.setAttribute('aria-selected',latest===activeTag?'true':'false');
    btn.dataset.tag=latest;
    btn.innerHTML=`v${esc(minor)}${isLatest?' <span class="ver-badge">current</span>':''}`;
    btn.addEventListener('click',()=>{state.activeVersion=latest;renderVersionBar(releases,latest);if(state.activeSection==='changelog')renderChangelog(latest);});
    bar.appendChild(btn);
  }
}

function renderSidebar(releases,activeSection,activeTag){
  const relGroup=SIDEBAR_GROUPS.find(g=>g.id==='releases');
  relGroup.items=releases.slice(0,6).map(r=>({key:'changelog',label:r.tag+(r.isLatest?' ← '+t('tab.changelog'):''),tag:r.tag,style:r.isLatest?'color:var(--green);font-weight:600':''}));
  if(releases.length>6)relGroup.items.push({key:'changelog',label:t('sb.all-versions'),tag:releases[releases.length-1].tag,style:'color:var(--faint)'});
  function buildLinks(container){
    container.innerHTML='';
    for(const group of SIDEBAR_GROUPS){
      const labelEl=document.createElement('span');labelEl.className='dsb-label';labelEl.textContent=t('sb.'+group.id);container.appendChild(labelEl);
      for(const item of group.items){
        const btn=document.createElement('button');
        btn.type='button';
        const isActive=activeSection===item.key&&(!item.tag||item.tag===activeTag);
        btn.className='dsb-link'+(isActive?' active':'');
        if(item.style)btn.setAttribute('style',item.style);
        const label=item.tag?esc(item.label):t('sb.'+item.key);
        btn.innerHTML=(item.icon||'')+label;
        btn.addEventListener('click',()=>{if(item.tag)state.activeVersion=item.tag;setSection(item.key);});
        container.appendChild(btn);
      }
      const div=document.createElement('div');div.className='dsb-divider';container.appendChild(div);
    }
  }
  buildLinks(document.getElementById('sidebar-inner'));
  buildLinks(document.getElementById('mob-nav-drawer'));
}

function renderChangelog(activeTag){
  const container=document.getElementById('doc-content');
  const activeMinor=activeTag.replace(/^v/,'').split('.').slice(0,2).join('.');
  const tagReleases=state.releases.filter(r=>r.tag.replace(/^v/,'').split('.').slice(0,2).join('.')===activeMinor);
  if(!tagReleases.length){
    container.innerHTML=`<div class="empty-state"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>${t('ch.empty')}<br><a href="https://github.com/skensell201/nexspence/releases" target="_blank" rel="noopener">${t('ch.empty-link')}</a></p></div>`;
    return;
  }
  const html=tagReleases.map((r,i)=>{
    const patchNum=parseInt(r.tag.split('.')[2]||'0',10);
    const tagClass=r.isLatest?'latest':patchNum===0?'minor':'patch';
    const tagLabel=r.isLatest?'latest':patchNum===0?'minor':'patch';
    const featuresHtml=r.features.length?`<div class="ch-group"><div class="ch-group-title">${t('ch.features')}</div><ul class="ch-items">${r.features.map(f=>`<li>${inlineMd(f)}</li>`).join('')}</ul></div>`:'';
    const fixesHtml=r.fixes.length?`<div class="ch-group"><div class="ch-group-title fix">${t('ch.fixes')}</div><ul class="ch-items">${r.fixes.map(f=>`<li>${inlineMd(f)}</li>`).join('')}</ul></div>`:'';
    const dockerHtml=r.dockerRaw?`<div class="ch-docker"><button class="ch-docker-toggle" onclick="this.nextElementSibling.classList.toggle('open')">${t('ch.docker-toggle')}</button><div class="ch-docker-body">${r.dockerRaw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div>`:'';
    const emptyHtml=!r.features.length&&!r.fixes.length?`<p style="font-size:.78rem;color:var(--faint)">${t('ch.no-entries')}</p>`:'';
    return `<div class="ch-card${i===0?' open':''}"><button class="ch-header" type="button" onclick="this.closest('.ch-card').classList.toggle('open')"><div><div class="ch-ver">${esc(r.tag)}</div><div class="ch-date">${esc(r.date)}</div></div><span class="ch-tag ${tagClass}">${tagLabel}</span><svg class="ch-chevron" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button><div class="ch-body">${featuresHtml}${fixesHtml}${dockerHtml}${emptyHtml}</div></div>`;
  }).join('');
  container.innerHTML=html+`<div style="text-align:center;padding:18px 0;border-top:1px solid var(--border);margin-top:4px"><a href="https://github.com/skensell201/nexspence/releases" target="_blank" rel="noopener" style="font-size:.78rem;color:#a78bfa;text-decoration:none;font-weight:600">${t('ch.view-all')}</a></div>`;
}

function renderStaticSection(key){
  const section=SECTIONS.find(s=>s.key===key);
  if(!section||!section.templateId)return;
  const tpl=document.getElementById(section.templateId);
  if(!tpl)return;
  const container=document.getElementById('doc-content');
  container.innerHTML='';
  const node=tpl.content.cloneNode(true);
  applyTranslations(node);
  container.appendChild(node);
}

function setSection(key){
  state.activeSection=key;
  document.getElementById('breadcrumb-current').textContent=t('crumb.'+key);
  document.getElementById('mob-active-page').textContent=t('sb.'+key);
  renderSidebar(state.releases,key,state.activeVersion);
  if(key==='changelog')renderChangelog(state.activeVersion);
  else renderStaticSection(key);
  if(window.innerWidth<=768)window.scrollTo({top:0,behavior:'smooth'});
}

const INST_DOCKER_VARIANTS=['std','ha','mon','sso','full'];
const INST_K8S_VARIANTS=['nginx','traefik','cilium-ing','istio','cilium-gw'];
function installPlatform(id,btn){
  const wrap=btn.closest('.inst-platform');
  wrap.querySelectorAll('.inst-ptab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  wrap.querySelectorAll('.inst-pnl').forEach(p=>p.classList.toggle('active',p.dataset.pnl===id));
  applyTranslations(document.getElementById('doc-content'));
}
function installVariant(platform,variant,btn){
  const variants=platform==='docker'?INST_DOCKER_VARIANTS:INST_K8S_VARIANTS;
  btn.parentElement.querySelectorAll('.inst-vchip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const wrap=btn.closest('.inst-pnl');
  wrap.querySelectorAll('.inst-vpnl').forEach(p=>p.classList.toggle('active',p.dataset.vpnl===platform+'-'+variant));
  applyTranslations(document.getElementById('doc-content'));
}
function copyCode(btn){
  const body=btn.closest('.cb').querySelector('.cb-body');
  navigator.clipboard.writeText(body.innerText).then(()=>{
    const orig=btn.textContent;btn.textContent='Copied!';
    setTimeout(()=>btn.textContent=orig,1800);
  }).catch(()=>{btn.textContent='Failed';setTimeout(()=>btn.textContent='Copy',1800);});
}

document.getElementById('mob-nav-toggle').addEventListener('click',function(){
  const drawer=document.getElementById('mob-nav-drawer');
  const isOpen=drawer.classList.toggle('open');
  this.classList.toggle('open',isOpen);
  this.setAttribute('aria-expanded',String(isOpen));
  drawer.setAttribute('aria-hidden',String(!isOpen));
});

(async()=>{
  try{
    state.releases=await fetchReleases();
    if(!state.releases.length)throw new Error('empty');
    state.activeVersion=state.releases[0].tag;
    state.activeSection='changelog';
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===state.lang));
    applyTranslations(document.querySelector('.docs-header'));
    renderVersionBar(state.releases,state.activeVersion);
    renderSidebar(state.releases,state.activeSection,state.activeVersion);
    renderChangelog(state.activeVersion);
  }catch(err){
    document.getElementById('ver-bar').innerHTML='';
    document.getElementById('doc-content').innerHTML=`<div class="empty-state"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>${t('ch.error')}<br><a href="https://github.com/skensell201/nexspence/releases" target="_blank" rel="noopener">${t('ch.error-link')}</a></p></div>`;
    state.releases=[];state.activeVersion='';
    renderSidebar([],state.activeSection,'');
  }
})();
