user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;  # только warn+ в prod
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;        # было 768 — маловато
    multi_accept on;                # принимать несколько соединений за раз
    use epoll;                      # эффективный I/O на Linux
}

http {
    ##
    # Basic Settings
    ##
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;

    server_tokens off;              # скрыть версию nginx в заголовках и ошибках

    server_names_hash_bucket_size 64;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # Timeouts — защита от slow-read/slow-write атак (Slowloris и др.)
    ##
    client_body_timeout 12s;
    client_header_timeout 12s;
    keepalive_timeout 15s;
    send_timeout 10s;

    ##
    # Ограничение размера запросов
    ##
    client_body_buffer_size 1k;
    client_header_buffer_size 1k;
    client_max_body_size 1m;        # поднять если нужен upload файлов
    large_client_header_buffers 2 1k;

    ##
    # SSL Settings
    ##
    ssl_protocols TLSv1.2 TLSv1.3;         # убраны TLSv1 и TLSv1.1 — уязвимы (BEAST, POODLE)
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;        # защита от TLS session ticket атак
    ssl_stapling on;                # OCSP stapling — быстрая проверка сертификата
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    ##
    # Security Headers (добавить в каждый server{} блок или здесь глобально)
    ##
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # add_header Content-Security-Policy "default-src 'self';" always;  # настроить под свой сайт
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;  # только после настройки HTTPS

    ##
    # Rate Limiting — защита от брутфорса и DDoS
    ##
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    ##
    # Logging
    ##
    access_log /var/log/nginx/access.log;
    log_not_found off;              # не логировать 404 на favicon/robots

    ##
    # Gzip
    ##
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    ##
    # Virtual Host Configs
    ##
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
