<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexspense — Interactive Architecture</title>
<style>
:root {
  --bg:        #070b14;
  --bg2:       #0d1424;
  --bg3:       #111827;
  --glass:     rgba(255,255,255,0.04);
  --border:    rgba(255,255,255,0.07);
  --border-hi: rgba(59,130,246,0.4);
  --blue:      #3b82f6;
  --blue-dim:  #1d4ed8;
  --blue-glow: rgba(59,130,246,0.25);
  --green:     #22c55e;
  --amber:     #f59e0b;
  --red:       #ef4444;
  --purple:    #a78bfa;
  --cyan:      #22d3ee;
  --text:      #e2e8f0;
  --text-dim:  #94a3b8;
  --text-mute: #475569;
  --radius:    14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, "SF Pro Display", "Segoe UI", sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% 0%, rgba(37,99,235,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(139,92,246,0.07) 0%, transparent 55%);
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg,#3b82f6,#1d4ed8); border-radius: 3px; }

/* ── Header ── */
.header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(7,11,20,0.8);
  backdrop-filter: blur(12px);
  flex-shrink: 0;
  z-index: 10;
}
.logo {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--blue) 0%, #1d4ed8 100%);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 900; color: #fff;
  box-shadow: 0 0 16px rgba(59,130,246,0.4);
  flex-shrink: 0;
}
.header-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.header-sub   { font-size: 11px; color: var(--text-mute); margin-top: 1px; }
.header-badge {
  margin-left: auto;
  font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
  background: rgba(59,130,246,0.12);
  border: 1px solid rgba(59,130,246,0.3);
  color: var(--blue);
  padding: 3px 10px; border-radius: 20px;
}
.header-hint {
  font-size: 11px; color: var(--text-mute);
  display: flex; align-items: center; gap: 6px;
}

/* ── 3-col body ── */
.body {
  display: grid;
  grid-template-columns: 220px 1fr 260px;
  flex: 1;
  overflow: hidden;
  gap: 0;
}

/* ── Left panel ── */
.left-panel {
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
  background: rgba(7,11,20,0.5);
}
.panel-section { flex-shrink: 0; padding: 14px 14px 8px; }
.panel-section-title {
  font-size: 9px; font-weight: 700; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--text-mute);
  margin-bottom: 8px;
}
.left-scroll { overflow-y: auto; flex: 1; }

/* Action items */
.action-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px;
  cursor: pointer;
  font-size: 12px; font-weight: 500;
  color: var(--text-dim);
  border-left: 2px solid transparent;
  transition: all .15s;
  user-select: none;
}
.action-item:hover { background: rgba(59,130,246,0.05); color: var(--text); }
.action-item.active {
  background: rgba(59,130,246,0.1);
  border-left-color: var(--blue);
  color: var(--blue);
}
.action-item.running { color: var(--amber); border-left-color: var(--amber); background: rgba(245,158,11,0.07); }
.action-icon { font-size: 14px; flex-shrink: 0; line-height: 1; }
.action-label { flex: 1; }
.action-running-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--amber);
  animation: runPulse 0.8s ease-in-out infinite alternate;
}
@keyframes runPulse { from { opacity: 0.3; } to { opacity: 1; } }

.divider { height: 1px; background: var(--border); margin: 4px 0; }

/* Service toggles */
.svc-toggle {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px;
  cursor: pointer;
  font-size: 11px; font-weight: 500;
  color: var(--text-dim);
  transition: all .15s;
  user-select: none;
}
.svc-toggle:hover { background: rgba(255,255,255,0.02); }
.svc-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0; transition: background .2s;
}
.svc-dot.up   { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.5); }
.svc-dot.down { background: var(--red);   box-shadow: 0 0 6px rgba(239,68,68,0.5); }
.svc-label { flex: 1; }
.svc-status { font-size: 9px; font-weight: 600; letter-spacing: 0.3px; }
.svc-status.up   { color: rgba(34,197,94,0.7); }
.svc-status.down { color: var(--red); }

/* ── Center: SVG canvas ── */
.center-panel {
  position: relative;
  overflow: hidden;
  background: transparent;
}
#graph-svg {
  width: 100%; height: 100%;
  display: block;
}

/* SVG node styles */
.svg-node rect { transition: fill .2s, stroke .2s, stroke-width .2s, filter .2s; }
.svg-node text {
  font-family: system-ui, -apple-system, "SF Pro Display", "Segoe UI", sans-serif;
  font-size: 11px; font-weight: 600;
  dominant-baseline: middle; text-anchor: middle;
  pointer-events: none;
}
.svg-node.state-normal rect   { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.1);  stroke-width: 1; }
.svg-node.state-active rect   { fill: rgba(59,130,246,0.18);  stroke: #3b82f6;                stroke-width: 1.5; filter: drop-shadow(0 0 8px rgba(59,130,246,0.5)); }
.svg-node.state-error  rect   { fill: rgba(239,68,68,0.14);   stroke: #ef4444;                stroke-width: 1.5; filter: drop-shadow(0 0 8px rgba(239,68,68,0.4)); }
.svg-node.state-down   rect   { fill: rgba(239,68,68,0.08);   stroke: rgba(239,68,68,0.4);    stroke-width: 1;   stroke-dasharray: 4 3; }
.svg-node.state-warn   rect   { fill: rgba(245,158,11,0.14);  stroke: #f59e0b;                stroke-width: 1.5; filter: drop-shadow(0 0 6px rgba(245,158,11,0.4)); }

.svg-node.color-cyan   text { fill: #22d3ee; }
.svg-node.color-blue   text { fill: #3b82f6; }
.svg-node.color-purple text { fill: #a78bfa; }
.svg-node.color-green  text { fill: #22c55e; }
.svg-node.color-amber  text { fill: #f59e0b; }
.svg-node.color-red    text { fill: #ef4444; }
.svg-node.color-mute   text { fill: #64748b; }
.svg-node.state-down   text { fill: rgba(239,68,68,0.6) !important; }

/* Layer labels */
.layer-label {
  font-family: system-ui, sans-serif;
  font-size: 9px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  fill: rgba(255,255,255,0.12);
}

/* Edges */
.svg-edge { stroke: rgba(255,255,255,0.07); stroke-width: 1; fill: none; }
.svg-edge.active { stroke: rgba(59,130,246,0.5); stroke-width: 1.5; }
.svg-edge.error  { stroke: rgba(239,68,68,0.5);  stroke-width: 1.5; }

/* Tooltip */
.node-tooltip {
  position: absolute;
  background: rgba(10,16,30,0.95);
  border: 1px solid var(--border-hi);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 11px;
  color: var(--text-dim);
  pointer-events: none;
  z-index: 100;
  max-width: 280px;
  line-height: 1.6;
  display: none;
  white-space: pre-line;
}
.node-tooltip.visible { display: block; }
.node-tooltip-title { font-weight: 700; color: var(--text); margin-bottom: 4px; font-size: 12px; }

/* ── Right panel: trace ── */
.right-panel {
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
  background: rgba(5,9,18,0.6);
}
.trace-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.trace-header-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
  color: var(--text-dim); text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between;
}
.replay-btn {
  display: none;
  background: rgba(59,130,246,0.1);
  border: 1px solid rgba(59,130,246,0.3);
  color: var(--blue);
  border-radius: 6px;
  padding: 2px 10px;
  font-size: 10px; font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.3px;
}
.replay-btn:hover { background: rgba(59,130,246,0.18); }
.trace-action-name {
  font-size: 12px; font-weight: 600; color: var(--text);
  margin-top: 4px;
}
.trace-empty {
  padding: 24px 16px;
  font-size: 12px; color: var(--text-mute);
  text-align: center; line-height: 1.6;
}
.trace-body { overflow-y: auto; flex: 1; padding: 8px 0; }
.trace-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 6px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  animation: traceIn .2s ease;
}
@keyframes traceIn { from { opacity:0; transform: translateX(-6px); } to { opacity:1; transform: none; } }
.trace-dot {
  width: 7px; height: 7px; border-radius: 50%;
  margin-top: 4px; flex-shrink: 0;
}
.trace-dot.ok    { background: var(--green); box-shadow: 0 0 4px rgba(34,197,94,0.5); }
.trace-dot.error { background: var(--red);   box-shadow: 0 0 4px rgba(239,68,68,0.5); }
.trace-dot.warn  { background: var(--amber); box-shadow: 0 0 4px rgba(245,158,11,0.5); }
.trace-dot.info  { background: var(--blue);  box-shadow: 0 0 4px rgba(59,130,246,0.5); }
.trace-content { flex: 1; min-width: 0; }
.trace-label  { font-size: 11px; color: var(--text); word-break: break-all; }
.trace-detail { font-size: 10px; color: var(--text-mute); margin-top: 2px; }
.trace-time   { font-size: 10px; color: var(--text-mute); flex-shrink: 0; font-variant-numeric: tabular-nums; }
.trace-status-badge {
  margin: 8px 16px;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px; font-weight: 600;
  text-align: center;
  animation: traceIn .2s ease;
}
.trace-status-badge.ok    { background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.3);  color: var(--green); }
.trace-status-badge.error { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">N</div>
  <div>
    <div class="header-title">Nexspense Architecture</div>
    <div class="header-sub">Interactive request flow diagram</div>
  </div>
  <div class="header-badge">INTERACTIVE</div>
  <div class="header-hint">← Select action &nbsp;·&nbsp; Toggle services to simulate failures</div>
</div>

<div class="body">
  <div class="left-panel" id="left-panel">
    <div class="left-scroll" id="left-scroll">
      <!-- rendered by JS -->
    </div>
  </div>

  <div class="center-panel" id="center-panel">
    <svg id="graph-svg" viewBox="0 0 900 560" preserveAspectRatio="xMidYMid meet">
      <!-- rendered by JS -->
    </svg>
    <div class="node-tooltip" id="node-tooltip">
      <div class="node-tooltip-title" id="tooltip-title"></div>
      <div id="tooltip-body"></div>
    </div>
  </div>

  <div class="right-panel" id="right-panel">
    <div class="trace-header">
      <div class="trace-header-title">
        <span style="display:flex;align-items:center;gap:8px"><span>⚡</span> Request Trace</span>
        <button class="replay-btn" id="replay-btn" onclick="replayAction()">↺ Replay</button>
      </div>
      <div class="trace-action-name" id="trace-action-name">—</div>
    </div>
    <div class="trace-body" id="trace-body">
      <div class="trace-empty">Select an action from the left panel to see the request flow</div>
    </div>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
//  DATA — populated in subsequent tasks
// ═══════════════════════════════════════════════════════
const NODES = {
  // ── Clients (y=40) ──
  maven:   { id:'maven',   label:'Maven CLI',    layer:'clients', x:60,  y:40,  color:'cyan',   w:90,  h:30 },
  npm:     { id:'npm',     label:'npm CLI',      layer:'clients', x:160, y:40,  color:'cyan',   w:90,  h:30 },
  docker:  { id:'docker',  label:'Docker CLI',   layer:'clients', x:265, y:40,  color:'cyan',   w:90,  h:30 },
  browser: { id:'browser', label:'Browser / UI', layer:'clients', x:380, y:40,  color:'cyan',   w:100, h:30 },
  pip:     { id:'pip',     label:'pip / twine',  layer:'clients', x:495, y:40,  color:'cyan',   w:90,  h:30 },
  cargo:   { id:'cargo',   label:'Cargo CLI',    layer:'clients', x:600, y:40,  color:'cyan',   w:90,  h:30 },
  helm:    { id:'helm',    label:'Helm CLI',     layer:'clients', x:700, y:40,  color:'cyan',   w:90,  h:30 },

  // ── HTTP (y=140) ──
  gin: {
    id:'gin', label:'Gin API Layer', layer:'http', x:420, y:140, color:'blue', w:140, h:34,
    tooltip:'Middleware chain:\nRecovery → RequestLogger → CORS\n→ MetricsMiddleware → AuditMiddleware\n→ AuthMiddleware → RBACMiddleware'
  },

  // ── Services (y=242) ──
  formatHandlers: { id:'formatHandlers', label:'Format Handlers', layer:'services', x:130, y:242, color:'purple', w:110, h:30 },
  userService:    { id:'userService',    label:'UserService',     layer:'services', x:270, y:242, color:'purple', w:100, h:30 },
  repoService:    { id:'repoService',    label:'RepoService',     layer:'services', x:410, y:242, color:'purple', w:100, h:30 },
  tokenService:   { id:'tokenService',   label:'TokenService',    layer:'services', x:545, y:242, color:'purple', w:100, h:30 },
  webhookSvc:     { id:'webhookSvc',     label:'WebhookService',  layer:'services', x:680, y:242, color:'purple', w:110, h:30 },
  scanService:    { id:'scanService',    label:'ScanService',     layer:'services', x:810, y:242, color:'purple', w:100, h:30 },

  // ── Data (y=355) ──
  postgres:  { id:'postgres',  label:'PostgreSQL', layer:'data', x:310, y:355, color:'green', w:110, h:32, toggleable:true, serviceKey:'postgres' },
  blobStore: { id:'blobStore', label:'BlobStore',  layer:'data', x:530, y:355, color:'green', w:110, h:32, toggleable:true, serviceKey:'blob' },

  // ── External (y=465) ──
  ldap:       { id:'ldap',       label:'LDAP',          layer:'external', x:130, y:465, color:'amber', w:90,  h:30, toggleable:true, serviceKey:'ldap' },
  oidc:       { id:'oidc',       label:'OIDC Provider', layer:'external', x:265, y:465, color:'amber', w:110, h:30, toggleable:true, serviceKey:'oidc' },
  upstream:   { id:'upstream',   label:'Upstream Proxy',layer:'external', x:415, y:465, color:'amber', w:120, h:30, toggleable:true, serviceKey:'upstream' },
  webhookRcv: { id:'webhookRcv', label:'Webhook Rcvr',  layer:'external', x:555, y:465, color:'amber', w:110, h:30, toggleable:true, serviceKey:'webhookRcv' },
  trivy:      { id:'trivy',      label:'Trivy Scanner', layer:'external', x:685, y:465, color:'amber', w:110, h:30, toggleable:true, serviceKey:'trivy' },
};

const EDGES = [
  // clients → gin
  { id:'maven_gin',   from:'maven',   to:'gin' },
  { id:'npm_gin',     from:'npm',     to:'gin' },
  { id:'docker_gin',  from:'docker',  to:'gin' },
  { id:'browser_gin', from:'browser', to:'gin' },
  { id:'pip_gin',     from:'pip',     to:'gin' },
  { id:'cargo_gin',   from:'cargo',   to:'gin' },
  { id:'helm_gin',    from:'helm',    to:'gin' },
  // gin → services
  { id:'gin_format',  from:'gin', to:'formatHandlers' },
  { id:'gin_user',    from:'gin', to:'userService' },
  { id:'gin_repo',    from:'gin', to:'repoService' },
  { id:'gin_token',   from:'gin', to:'tokenService' },
  { id:'gin_webhook', from:'gin', to:'webhookSvc' },
  { id:'gin_scan',    from:'gin', to:'scanService' },
  // services → data
  { id:'format_blob', from:'formatHandlers', to:'blobStore' },
  { id:'format_pg',   from:'formatHandlers', to:'postgres' },
  { id:'user_pg',     from:'userService',    to:'postgres' },
  { id:'repo_pg',     from:'repoService',    to:'postgres' },
  { id:'token_pg',    from:'tokenService',   to:'postgres' },
  { id:'scan_pg',     from:'scanService',    to:'postgres' },
  // services → external
  { id:'user_ldap',   from:'userService',    to:'ldap' },
  { id:'user_oidc',   from:'userService',    to:'oidc' },
  { id:'format_up',   from:'formatHandlers', to:'upstream' },
  { id:'webhook_rcv', from:'webhookSvc',     to:'webhookRcv' },
  { id:'scan_trivy',  from:'scanService',    to:'trivy' },
  { id:'blobstore_browser', from:'blobStore', to:'browser' },
  { id:'gin_oidc',          from:'gin',       to:'oidc' },
];
const SERVICES = {
  postgres:   { key:'postgres',   label:'PostgreSQL',    nodeId:'postgres',   up:true },
  ldap:       { key:'ldap',       label:'LDAP',          nodeId:'ldap',       up:true },
  oidc:       { key:'oidc',       label:'OIDC Provider', nodeId:'oidc',       up:true },
  blob:       { key:'blob',       label:'BlobStore',     nodeId:'blobStore',  up:true },
  upstream:   { key:'upstream',   label:'Upstream Proxy',nodeId:'upstream',   up:true },
  webhookRcv: { key:'webhookRcv', label:'Webhook Rcvr',  nodeId:'webhookRcv', up:true },
  trivy:      { key:'trivy',      label:'Trivy Scanner', nodeId:'trivy',      up:true },
};

const ACTIONS = [
  { id:'login_password', label:'Логин — пароль',       icon:'🔐', dependsOn:['postgres'], steps:[], failureSteps:{} },
  { id:'login_ldap',     label:'Логин — LDAP',          icon:'🪪', dependsOn:['ldap','postgres'], steps:[], failureSteps:{} },
  { id:'login_oidc',     label:'Логин — OIDC/SSO',      icon:'🔑', dependsOn:['oidc','postgres'], steps:[], failureSteps:{} },
  { id:'upload',         label:'Загрузка артефакта',    icon:'📦', dependsOn:['postgres','blob'], steps:[], failureSteps:{} },
  { id:'download',       label:'Скачивание артефакта',  icon:'⬇️', dependsOn:['postgres','blob'], steps:[], failureSteps:{} },
  { id:'proxy_miss',     label:'Proxy cache miss',       icon:'🔄', dependsOn:['upstream','blob','postgres'], steps:[], failureSteps:{} },
  { id:'docker_pull',    label:'Docker pull',            icon:'🐳', dependsOn:['postgres','blob'], steps:[], failureSteps:{} },
  { id:'api_token',      label:'API Token',              icon:'🔒', dependsOn:['postgres'], steps:[], failureSteps:{} },
  { id:'webhook',        label:'Webhook delivery',       icon:'⚡', dependsOn:['webhookRcv','postgres','blob'], steps:[], failureSteps:{} },
  { id:'cleanup',        label:'Cleanup Policy run',     icon:'🧹', dependsOn:['postgres','blob'], steps:[], failureSteps:{} },
  { id:'search',         label:'Поиск компонентов',     icon:'🔍', dependsOn:['postgres'], steps:[], failureSteps:{} },
  { id:'scan',           label:'Vulnerability scan',    icon:'🛡️', dependsOn:['trivy','postgres'], steps:[], failureSteps:{} },
];

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
const state = {
  selectedAction: null,
  running: false,
  services: {},
};

// ═══════════════════════════════════════════════════════
//  STUBS — replaced in subsequent tasks
// ═══════════════════════════════════════════════════════
function renderLeftPanel() {
  // Init state.services from SERVICES
  Object.values(SERVICES).forEach(s => { state.services[s.key] = true; });

  const scroll = document.getElementById('left-scroll');
  scroll.innerHTML = '';

  // Actions section title
  const actSection = document.createElement('div');
  actSection.className = 'panel-section';
  actSection.innerHTML = '<div class="panel-section-title">Действия</div>';
  scroll.appendChild(actSection);

  // Action items
  ACTIONS.forEach(action => {
    const el = document.createElement('div');
    el.className = 'action-item';
    el.id = 'action-' + action.id;
    el.innerHTML = `<span class="action-icon">${action.icon}</span><span class="action-label">${action.label}</span>`;
    el.addEventListener('click', () => handleActionClick(action));
    scroll.appendChild(el);
  });

  // Divider
  const divider = document.createElement('div');
  divider.className = 'divider';
  divider.style.margin = '8px 0';
  scroll.appendChild(divider);

  // Services section title
  const svcSection = document.createElement('div');
  svcSection.className = 'panel-section';
  svcSection.innerHTML = '<div class="panel-section-title">Сервисы</div>';
  scroll.appendChild(svcSection);

  // Service toggles
  Object.values(SERVICES).forEach(svc => {
    const el = document.createElement('div');
    el.className = 'svc-toggle';
    el.id = 'svc-' + svc.key;
    el.innerHTML = `
      <div class="svc-dot up" id="svc-dot-${svc.key}"></div>
      <span class="svc-label">${svc.label}</span>
      <span class="svc-status up" id="svc-status-${svc.key}">UP</span>
    `;
    el.addEventListener('click', () => toggleService(svc.key));
    scroll.appendChild(el);
  });
}

function handleActionClick(action) {
  if (state.running) return;
  document.querySelectorAll('.action-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('action-' + action.id);
  if (el) el.classList.add('active');
  state.selectedAction = action.id;
  document.getElementById('trace-action-name').textContent = action.icon + ' ' + action.label;

  // Guard: no steps yet (Tasks 5/6 fill them in)
  const stepsToUse = getStepsForAction(action);
  if (!stepsToUse || stepsToUse.length === 0) {
    const body = document.getElementById('trace-body');
    body.innerHTML = '<div class="trace-empty">No steps defined for this action yet.</div>';
    return;
  }
  playAction(action);
}

function toggleService(key) {
  state.services[key] = !state.services[key];
  const svc = SERVICES[key];
  const up = state.services[key];

  // Update toggle UI
  const dot    = document.getElementById('svc-dot-' + key);
  const status = document.getElementById('svc-status-' + key);
  dot.className    = 'svc-dot ' + (up ? 'up' : 'down');
  status.className = 'svc-status ' + (up ? 'up' : 'down');
  status.textContent = up ? 'UP' : 'DOWN';

  // Update corresponding graph node
  setNodeState(svc.nodeId, up ? 'normal' : 'down');
}

function getStepsForAction(action) {
  // Full implementation in Task 4; stub returns empty for now
  for (const svcKey of (action.dependsOn || [])) {
    if (!state.services[svcKey] && action.failureSteps && action.failureSteps[svcKey]) {
      return action.failureSteps[svcKey];
    }
  }
  return action.steps;
}
function renderGraph() {
  const svg = document.getElementById('graph-svg');

  // Layer labels
  [
    { label:'CLIENTS',    y:16 },
    { label:'HTTP / GIN', y:116 },
    { label:'SERVICES',   y:218 },
    { label:'DATA',       y:330 },
    { label:'EXTERNAL',   y:440 },
  ].forEach(l => {
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x','8');
    t.setAttribute('y', l.y);
    t.setAttribute('class','layer-label');
    t.textContent = l.label;
    svg.appendChild(t);
  });

  // Draw edges (behind nodes)
  EDGES.forEach(e => {
    const fn = NODES[e.from], tn = NODES[e.to];
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', fn.x);
    line.setAttribute('y1', fn.y + fn.h / 2);
    line.setAttribute('x2', tn.x);
    line.setAttribute('y2', tn.y - tn.h / 2);
    line.setAttribute('class','svg-edge');
    line.id = 'edge-' + e.id;
    svg.appendChild(line);
  });

  // Draw nodes
  Object.values(NODES).forEach(n => {
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class', `svg-node color-${n.color} state-normal`);
    g.id = 'node-' + n.id;

    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', n.x - n.w / 2);
    rect.setAttribute('y', n.y - n.h / 2);
    rect.setAttribute('width', n.w);
    rect.setAttribute('height', n.h);
    rect.setAttribute('rx', '7');

    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x', n.x);
    text.setAttribute('y', n.y);
    text.textContent = n.label;

    g.appendChild(rect);
    g.appendChild(text);

    if (n.tooltip) {
      g.style.cursor = 'help';
      g.addEventListener('mouseenter', ev => showTooltip(n, ev));
      g.addEventListener('mouseleave', hideTooltip);
    }

    svg.appendChild(g);
  });
}

function showTooltip(node, ev) {
  const tip = document.getElementById('node-tooltip');
  document.getElementById('tooltip-title').textContent = node.label;
  document.getElementById('tooltip-body').innerHTML = node.tooltip.replace(/\n/g, '<br>');
  const panel = document.getElementById('center-panel');
  const pr = panel.getBoundingClientRect();
  tip.style.left = (ev.clientX - pr.left + 12) + 'px';
  tip.style.top  = (ev.clientY - pr.top  + 12) + 'px';
  tip.classList.add('visible');
}

function hideTooltip() {
  document.getElementById('node-tooltip').classList.remove('visible');
}

function setNodeState(nodeId, st) {
  const g = document.getElementById('node-' + nodeId);
  if (!g) return;
  // Replace state-X class while preserving color-X class
  const classes = g.getAttribute('class').replace(/state-\w+/, '').trim();
  g.setAttribute('class', classes + ' state-' + st);
}
// ═══════════════════════════════════════════════════════
//  ANIMATION ENGINE
// ═══════════════════════════════════════════════════════

let _animTimer = null;

function resetAllNodes() {
  Object.values(NODES).forEach(n => {
    const down = n.serviceKey && !state.services[n.serviceKey];
    setNodeState(n.id, down ? 'down' : 'normal');
  });
  document.querySelectorAll('.svg-edge').forEach(el => {
    el.setAttribute('class', 'svg-edge');
  });
}

function getEdgeId(fromId, toId) {
  const direct = EDGES.find(e => e.from === fromId && e.to === toId);
  if (direct) return direct.id;
  const rev = EDGES.find(e => e.from === toId && e.to === fromId);
  return rev ? rev.id : null;
}

function animateDot(step) {
  const svg = document.getElementById('graph-svg');
  // Use from/to directly — reverse flag just means it's a response; direction is already correct
  const from = NODES[step.from];
  const to   = NODES[step.to];
  if (!from || !to) return;

  const isError = step.status === 'error';
  const isWarn  = step.status === 'warn';
  const color   = isError ? '#ef4444' : isWarn ? '#f59e0b' : (step.reverse ? '#22c55e' : '#3b82f6');
  const radius  = step.reverse ? 4 : 5;

  const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  circle.setAttribute('r', radius);
  circle.setAttribute('fill', color);
  circle.setAttribute('opacity', '0.95');
  svg.appendChild(circle);

  const durMs = Math.min(Math.max(50, (step.ms || 0) / 8), 900);

  circle.animate(
    [
      { transform: `translate(${from.x}px,${from.y}px)` },
      { transform: `translate(${to.x}px,${to.y}px)` },
    ],
    { duration: durMs, easing: 'cubic-bezier(0.4,0,0.2,1)', fill: 'forwards' }
  ).onfinish = () => setTimeout(() => circle.remove(), 80);

  // Highlight edge
  const edgeId = getEdgeId(step.from, step.to);
  if (edgeId) {
    const edgeEl = document.getElementById('edge-' + edgeId);
    if (edgeEl) edgeEl.setAttribute('class', 'svg-edge ' + (isError ? 'error' : 'active'));
  }
}

function clearTrace() {
  document.getElementById('trace-body').innerHTML = '';
  document.getElementById('replay-btn').style.display = 'none';
}

function appendTraceRow(step, elapsed) {
  const body = document.getElementById('trace-body');
  const row = document.createElement('div');
  row.className = 'trace-row';

  const isError = step.status === 'error';
  const isWarn  = step.status === 'warn';
  const dotClass = isError ? 'error' : isWarn ? 'warn' : (step.reverse ? 'ok' : 'info');
  const timeStr  = elapsed >= 1000 ? (elapsed / 1000).toFixed(1) + 's' : elapsed + 'ms';

  row.innerHTML = `
    <div class="trace-dot ${dotClass}"></div>
    <div class="trace-content">
      <div class="trace-label">${step.label || (step.from + ' → ' + step.to)}</div>
      ${step.detail ? `<div class="trace-detail">${step.detail}</div>` : ''}
    </div>
    <div class="trace-time">+${timeStr}</div>
  `;
  body.appendChild(row);
  body.scrollTop = body.scrollHeight;
}

function appendTraceStatus(isError) {
  const body = document.getElementById('trace-body');
  const badge = document.createElement('div');
  badge.className = 'trace-status-badge ' + (isError ? 'error' : 'ok');
  badge.textContent = isError ? '✕ Failed' : '✓ Success';
  body.appendChild(badge);
  body.scrollTop = body.scrollHeight;
  document.getElementById('replay-btn').style.display = 'block';
}

function playAction(action) {
  if (_animTimer) { clearTimeout(_animTimer); _animTimer = null; }
  clearTrace();
  resetAllNodes();
  state.running = true;

  // Mark running
  document.querySelectorAll('.action-item').forEach(el => el.classList.remove('running'));
  const actionEl = document.getElementById('action-' + action.id);
  if (actionEl) { actionEl.classList.remove('active'); actionEl.classList.add('running'); }

  const steps = getStepsForAction(action);
  if (!steps || steps.length === 0) {
    state.running = false;
    document.getElementById('trace-body').innerHTML = '<div class="trace-empty">No steps defined for this action yet.</div>';
    if (actionEl) { actionEl.classList.remove('running'); actionEl.classList.add('active'); }
    return;
  }

  let elapsed = 0;
  let i = 0;

  function playStep() {
    if (i >= steps.length) {
      state.running = false;
      const lastStatus = steps[steps.length - 1]?.status;
      appendTraceStatus(lastStatus === 'error');
      if (actionEl) { actionEl.classList.remove('running'); actionEl.classList.add('active'); }
      return;
    }

    const step = steps[i];
    elapsed += step.ms || 0;

    // Highlight source and target nodes
    const nodeStatus = step.status === 'error' ? 'error' : step.status === 'warn' ? 'warn' : 'active';
    setNodeState(step.from, nodeStatus);
    setNodeState(step.to,   nodeStatus);

    animateDot(step);
    appendTraceRow(step, elapsed);

    i++;
    _animTimer = setTimeout(playStep, 680);
  }

  playStep();
}

function replayAction() {
  if (state.running) return;
  const action = ACTIONS.find(a => a.id === state.selectedAction);
  if (action) {
    clearTrace();
    resetAllNodes();
    playAction(action);
  }
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
function init() {
  renderLeftPanel();
  renderGraph();
}

document.addEventListener('DOMContentLoaded', init);
</script>
