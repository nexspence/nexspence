openapi: 3.1.0
info:
  title: Nexspence API
  description: |
    Nexspence REST API — two surfaces:
    - `/service/rest/v1/` — **Nexus v1 compatible** (drop-in replacement)
    - `/api/v1/` — **Native Nexspence API** (extended features + migration)

    ## Authentication
    All endpoints (except anonymous-allowed) require one of:
    - **HTTP Basic Auth** — `Authorization: Basic base64(user:pass)`
    - **Bearer token** — `Authorization: Bearer <api-token>`
  version: 1.0.0
  contact:
    name: Nexspence

servers:
  - url: http://localhost:8080
    description: Local development

# ================================================================
# SECURITY SCHEMES
# ================================================================
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer

  # ── Common schemas ──────────────────────────────────────────
  schemas:

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }

    LoginResponse:
      type: object
      properties:
        token:    { type: string, description: "JWT bearer token" }
        userId:   { type: string }
        username: { type: string }
        roles:    { type: array, items: { type: string } }

    AuditEvent:
      type: object
      properties:
        id:         { type: integer }
        eventTime:  { type: string, format: date-time }
        userId:     { type: string, nullable: true }
        username:   { type: string }
        remoteIp:   { type: string }
        userAgent:  { type: string }
        domain:     { type: string, enum: [REPOSITORY, SECURITY, USER, BLOBSTORE, CLEANUP, SYSTEM] }
        action:     { type: string, enum: [CREATE, UPDATE, DELETE, LOGIN, LOGOUT] }
        entityType: { type: string }
        entityId:   { type: string }
        entityName: { type: string }
        result:     { type: string, enum: [success, failure, denied] }

    MetricsSnapshot:
      type: object
      properties:
        uptime_seconds:   { type: number }
        requests_total:   { type: integer }
        request_errors:   { type: integer }
        artifacts_stored: { type: integer }
        bytes_stored:     { type: integer }
        goroutines:       { type: integer }
        memory:
          type: object
          properties:
            alloc_bytes:       { type: integer }
            total_alloc_bytes: { type: integer }
            sys_bytes:         { type: integer }
            gc_cycles:         { type: integer }

    Repository:
      type: object
      required: [name, format, type, url, online]
      properties:
        name:     { type: string, example: maven-central-proxy }
        format:   { type: string, enum: [maven2, npm, docker, pypi, go, nuget, helm, raw, apt, yum, cargo, conan, conda, terraform] }
        type:     { type: string, enum: [hosted, proxy, group] }
        url:      { type: string, example: "http://localhost:8080/repository/maven-central-proxy/" }
        online:   { type: boolean }
        storage:
          type: object
          properties:
            blobStoreName: { type: string }
            strictContentTypeValidation: { type: boolean }
            writePolicy: { type: string, enum: [allow, deny, allow_once] }
        proxy:
          type: object
          properties:
            remoteUrl:       { type: string }
            contentMaxAge:   { type: integer }
            metadataMaxAge:  { type: integer }
        negativeCache:
          type: object
          properties:
            enabled: { type: boolean }
            timeToLive: { type: integer }
        httpClient:
          type: object
          properties:
            blocked:    { type: boolean }
            autoBlock:  { type: boolean }
        group:
          type: object
          properties:
            memberNames:
              type: array
              items: { type: string }
        cleanup:
          type: object
          properties:
            policyNames:
              type: array
              items: { type: string }

    Component:
      type: object
      properties:
        id:         { type: string }
        repository: { type: string }
        format:     { type: string }
        group:      { type: string }
        name:       { type: string }
        version:    { type: string }
        assets:
          type: array
          items:
            $ref: '#/components/schemas/Asset'

    Asset:
      type: object
      properties:
        id:           { type: string }
        downloadUrl:  { type: string }
        path:         { type: string }
        repository:   { type: string }
        format:       { type: string }
        checksum:
          type: object
          properties:
            sha1:   { type: string }
            sha256: { type: string }
            md5:    { type: string }
        contentType:  { type: string }
        fileSize:     { type: integer }
        lastModified: { type: string, format: date-time }
        lastDownloaded: { type: string, format: date-time }

    User:
      type: object
      properties:
        userId:     { type: string }
        firstName:  { type: string }
        lastName:   { type: string }
        emailAddress: { type: string }
        source:     { type: string }
        status:     { type: string, enum: [active, disabled] }
        roles:
          type: array
          items: { type: string }

    Role:
      type: object
      properties:
        id:          { type: string }
        name:        { type: string }
        description: { type: string }
        privileges:
          type: array
          items: { type: string }
        roles:
          type: array
          items: { type: string }

    BlobStore:
      type: object
      properties:
        name:            { type: string }
        type:            { type: string, enum: [File, S3] }
        totalSizeInBytes: { type: integer }
        availableSpaceInBytes: { type: integer }
        blobCount:       { type: integer }

    CleanupPolicy:
      type: object
      properties:
        name:        { type: string }
        format:      { type: string }
        notes:       { type: string }
        criteria:
          type: object
          properties:
            lastBlobUpdated:    { type: integer, description: "days" }
            lastDownloaded:     { type: integer, description: "days" }
            preRelease:         { type: string, enum: [RELEASES, PRERELEASES, "*"] }
            regexKey:           { type: string }
        retainNVersions: { type: integer, default: 0, description: "Nexspence: keep N newest versions of each (group_id, name) even if they match other criteria. 0 = disabled." }
        scheduleCron:  { type: string, description: "Nexspence extension: cron expression" }

    PagedResponse:
      type: object
      properties:
        items:
          type: array
          items: {}
        continuationToken:
          type: string
          nullable: true

    MigrationJob:
      type: object
      properties:
        id:             { type: string }
        sourceUrl:      { type: string }
        status:         { type: string, enum: [pending, running, paused, done, error] }
        totalRepos:     { type: integer }
        doneRepos:      { type: integer }
        totalAssets:    { type: integer }
        doneAssets:     { type: integer }
        totalBytes:     { type: integer }
        doneBytes:      { type: integer }
        errorCount:     { type: integer }
        lastError:      { type: string, nullable: true }
        startedAt:      { type: string, format: date-time, nullable: true }
        finishedAt:     { type: string, format: date-time, nullable: true }

security:
  - basicAuth: []
  - bearerAuth: []

# ================================================================
# PATHS
# ================================================================
paths:

  # ── Authentication ───────────────────────────────────────────

  /api/v1/login:
    post:
      tags: [Auth]
      summary: Login and obtain JWT token
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '401': { description: Invalid credentials }

  /service/rest/v1/security/users/login:
    post:
      tags: [Auth]
      summary: Nexus-compatible login endpoint
      operationId: loginNexusCompat
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/LoginResponse' } } } }
        '401': { description: Unauthorized }

  /api/v1/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      operationId: getMe
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } }
        '401': { description: Unauthorized }

  # ── Metrics (Nexspence-native, public) ───────────────────────────

  /api/v1/metrics:
    get:
      tags: [System]
      summary: In-process metrics snapshot (no auth required)
      operationId: getMetrics
      security: []
      responses:
        '200':
          description: Metrics snapshot
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MetricsSnapshot' }

  # ── Repository management ────────────────────────────────────

  /service/rest/v1/repositories:
    get:
      tags: [Repositories]
      summary: List all repositories
      operationId: listRepositories
      parameters:
        - { name: format, in: query, schema: { type: string } }
        - { name: type,   in: query, schema: { type: string } }
      responses:
        '200':
          description: Repository list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Repository' }

  /service/rest/v1/repositories/{repositoryName}:
    get:
      tags: [Repositories]
      summary: Get repository by name
      operationId: getRepository
      parameters:
        - { name: repositoryName, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Repository' } } } }
        '404': { description: Not found }
    delete:
      tags: [Repositories]
      summary: Delete repository
      operationId: deleteRepository
      parameters:
        - { name: repositoryName, in: path, required: true, schema: { type: string } }
      responses:
        '204': { description: Deleted }

  /service/rest/v1/repositories/{repositoryName}/rebuild-index:
    post:
      tags: [Repositories]
      summary: Rebuild search index for repository
      operationId: rebuildIndex
      parameters:
        - { name: repositoryName, in: path, required: true, schema: { type: string } }
      responses:
        '204': { description: Accepted }

  /service/rest/v1/repositories/{repositoryName}/invalidate-cache:
    post:
      tags: [Repositories]
      summary: Invalidate proxy cache
      operationId: invalidateCache
      parameters:
        - { name: repositoryName, in: path, required: true, schema: { type: string } }
      responses:
        '204': { description: Accepted }

  # Per-format repository creation (Nexus pattern)
  /service/rest/v1/repositories/maven/hosted:
    post:
      tags: [Repositories]
      summary: Create Maven hosted repository
      operationId: createMavenHosted
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Repository' }
      responses:
        '201': { description: Created }

  /service/rest/v1/repositories/maven/proxy:
    post:
      tags: [Repositories]
      summary: Create Maven proxy repository
      operationId: createMavenProxy
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Repository' } } } }
      responses:
        '201': { description: Created }

  /service/rest/v1/repositories/maven/group:
    post:
      tags: [Repositories]
      summary: Create Maven group repository
      operationId: createMavenGroup
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Repository' } } } }
      responses:
        '201': { description: Created }

  # npm, docker, pypi, go, nuget, helm, raw — same pattern, omitted for brevity
  # Full coverage: /service/rest/v1/repositories/{format}/{type}

  # ── Component search ─────────────────────────────────────────

  /service/rest/v1/search:
    get:
      tags: [Search]
      summary: Search components
      operationId: searchComponents
      parameters:
        - { name: repository,        in: query, schema: { type: string } }
        - { name: format,            in: query, schema: { type: string } }
        - { name: group,             in: query, schema: { type: string } }
        - { name: name,              in: query, schema: { type: string } }
        - { name: version,           in: query, schema: { type: string } }
        - { name: prerelease,        in: query, schema: { type: boolean } }
        # Maven-specific
        - { name: maven.groupId,     in: query, schema: { type: string } }
        - { name: maven.artifactId,  in: query, schema: { type: string } }
        - { name: maven.version,     in: query, schema: { type: string } }
        - { name: maven.classifier,  in: query, schema: { type: string } }
        - { name: maven.extension,   in: query, schema: { type: string } }
        # npm-specific
        - { name: npm.scope,         in: query, schema: { type: string } }
        # Docker-specific
        - { name: docker.imageName,  in: query, schema: { type: string } }
        - { name: docker.imageTag,   in: query, schema: { type: string } }
        - { name: docker.layerId,    in: query, schema: { type: string } }
        # PyPI-specific
        - { name: pypi.classifiers,  in: query, schema: { type: string } }
        # Pagination
        - { name: continuationToken, in: query, schema: { type: string } }
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PagedResponse'
                  - properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Component' }

  /service/rest/v1/search/assets:
    get:
      tags: [Search]
      summary: Search assets
      operationId: searchAssets
      parameters:
        - { name: repository, in: query, schema: { type: string } }
        - { name: format,     in: query, schema: { type: string } }
        - { name: name,       in: query, schema: { type: string } }
        - { name: sha256,     in: query, schema: { type: string } }
        - { name: continuationToken, in: query, schema: { type: string } }
      responses:
        '200':
          description: Asset search results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PagedResponse'
                  - properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Asset' }

  # ── Components ───────────────────────────────────────────────

  /service/rest/v1/components:
    get:
      tags: [Components]
      summary: List components in a repository
      operationId: listComponents
      parameters:
        - { name: repository,        in: query, required: true, schema: { type: string } }
        - { name: continuationToken, in: query, schema: { type: string } }
      responses:
        '200':
          description: Component list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PagedResponse'
                  - properties:
                      items: { type: array, items: { $ref: '#/components/schemas/Component' } }
    post:
      tags: [Components]
      summary: Upload a component (multipart)
      operationId: uploadComponent
      parameters:
        - { name: repository, in: query, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                # Maven
                maven2.groupId:    { type: string }
                maven2.artifactId: { type: string }
                maven2.version:    { type: string }
                maven2.asset:      { type: string, format: binary }
                maven2.asset.extension: { type: string }
                # npm
                npm.asset: { type: string, format: binary }
                # pypi
                pypi.asset: { type: string, format: binary }
                # raw
                raw.directory: { type: string }
                raw.asset:     { type: string, format: binary }
                raw.asset.filename: { type: string }
      responses:
        '204': { description: Uploaded }

  /service/rest/v1/components/{id}:
    get:
      tags: [Components]
      summary: Get component by ID
      operationId: getComponent
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Component' } } } }
    delete:
      tags: [Components]
      summary: Delete component
      operationId: deleteComponent
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '204': { description: Deleted }

  # ── Assets ───────────────────────────────────────────────────

  /service/rest/v1/assets:
    get:
      tags: [Assets]
      summary: List assets in a repository
      operationId: listAssets
      parameters:
        - { name: repository,        in: query, required: true, schema: { type: string } }
        - { name: continuationToken, in: query, schema: { type: string } }
      responses:
        '200':
          description: Asset list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PagedResponse'
                  - properties:
                      items: { type: array, items: { $ref: '#/components/schemas/Asset' } }

  /service/rest/v1/assets/{id}:
    get:
      tags: [Assets]
      summary: Get asset by ID
      operationId: getAsset
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Asset' } } } }
    delete:
      tags: [Assets]
      summary: Delete asset
      operationId: deleteAsset
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '204': { description: Deleted }

  # ── Security — Users ─────────────────────────────────────────

  /service/rest/v1/security/users:
    get:
      tags: [Security]
      summary: List users
      operationId: listUsers
      parameters:
        - { name: userId, in: query, schema: { type: string } }
        - { name: source, in: query, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/User' } } } } }
    post:
      tags: [Security]
      summary: Create user
      operationId: createUser
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } }
      responses:
        '200': { description: Created }

  /service/rest/v1/security/users/{userId}:
    get:
      tags: [Security]
      summary: Get user by ID
      operationId: getUser
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } }
        '404': { description: Not found }
    put:
      tags: [Security]
      summary: Update user
      operationId: updateUser
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } }
      responses:
        '200': { description: Updated }
    delete:
      tags: [Security]
      summary: Delete user
      operationId: deleteUser
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        '204': { description: Deleted }

  /service/rest/v1/security/users/{userId}/change-password:
    put:
      tags: [Security]
      summary: Change user password
      operationId: changePassword
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          text/plain:
            schema: { type: string }
      responses:
        '204': { description: Changed }

  # ── Security — Roles ─────────────────────────────────────────

  /service/rest/v1/security/roles:
    get:
      tags: [Security]
      summary: List roles
      operationId: listRoles
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Role' } } } } }
    post:
      tags: [Security]
      summary: Create role
      operationId: createRole
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Role' } } } }
      responses:
        '200': { description: Created }

  /service/rest/v1/security/roles/{id}:
    get:
      tags: [Security]
      operationId: getRole
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Role' } } } }
    put:
      tags: [Security]
      operationId: updateRole
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Role' } } } }
      responses:
        '204': { description: Updated }
    delete:
      tags: [Security]
      operationId: deleteRole
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '204': { description: Deleted }

  # ── Security — API Tokens ────────────────────────────────────

  /service/rest/v1/security/user-tokens:
    get:
      tags: [Security]
      summary: Check if user tokens are enabled
      operationId: getUserTokensEnabled
      responses:
        '200': { description: OK }
    put:
      tags: [Security]
      summary: Enable/disable user tokens capability
      operationId: setUserTokensEnabled
      responses:
        '204': { description: OK }

  /service/rest/v1/security/user-tokens/reset:
    delete:
      tags: [Security]
      summary: Purge all user tokens
      operationId: purgeUserTokens
      responses:
        '204': { description: OK }

  # ── Blob Stores ──────────────────────────────────────────────

  /service/rest/v1/blobstores:
    get:
      tags: [BlobStores]
      summary: List blob stores
      operationId: listBlobStores
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/BlobStore' } } } } }

  /service/rest/v1/blobstores/{name}:
    get:
      tags: [BlobStores]
      operationId: getBlobStore
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/BlobStore' } } } }
    delete:
      tags: [BlobStores]
      operationId: deleteBlobStore
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        '204': { description: Deleted }

  /service/rest/v1/blobstores/{name}/quota-status:
    get:
      tags: [BlobStores]
      operationId: getBlobStoreQuota
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }

  /api/v1/blobstores/{name}/compact:
    post:
      tags: [BlobStores]
      summary: Garbage-collect unreferenced blobs
      description: >
        Scans the named blob store and removes blobs no longer referenced by any
        asset (orphans) that are older than the grace period. Admin only.
      operationId: compactBlobStore
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
        - name: dry_run
          in: query
          required: false
          description: Report orphans without deleting them.
          schema: { type: boolean }
        - name: min_age
          in: query
          required: false
          description: >
            Only collect orphans older than this Go duration (e.g. "24h").
            Absent or 0 uses the server's configured gc.min_age default.
          schema: { type: string }
      responses:
        '200':
          description: Compaction result
          content:
            application/json:
              schema:
                type: object
                properties:
                  store: { type: string }
                  scannedBlobs: { type: integer }
                  orphans: { type: integer }
                  freedBytes: { type: integer, format: int64 }
                  dryRun: { type: boolean }
                  errors: { type: array, items: { type: string } }
        '400': { description: Invalid min_age }
        '503': { description: GC service not configured }

  /service/rest/v1/blobstores/file:
    post:
      tags: [BlobStores]
      summary: Create local file blob store
      operationId: createFileBlobStore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, path]
              properties:
                name: { type: string }
                path: { type: string }
                softQuota:
                  type: object
                  properties:
                    type: { type: string, enum: [spaceRemainingQuota, spaceUsedQuota] }
                    limit: { type: integer }
      responses:
        '204': { description: Created }

  /service/rest/v1/blobstores/s3:
    post:
      tags: [BlobStores]
      summary: Create S3 blob store
      operationId: createS3BlobStore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:   { type: string }
                region: { type: string }
                bucket: { type: string }
                prefix: { type: string }
                expiration: { type: integer }
                accessKeyId:      { type: string }
                secretAccessKey:  { type: string }
                endpoint:         { type: string, description: "Custom endpoint for MinIO, etc." }
                signerType:       { type: string, enum: [DEFAULT, S3SignerType] }
                forcePathStyle:   { type: boolean }
      responses:
        '204': { description: Created }

  # ── Cleanup Policies ─────────────────────────────────────────

  /service/rest/v1/cleanup-policies:
    get:
      tags: [Cleanup]
      operationId: listCleanupPolicies
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/CleanupPolicy' } } } } }
    post:
      tags: [Cleanup]
      operationId: createCleanupPolicy
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CleanupPolicy' } } } }
      responses:
        '200': { description: Created }

  /service/rest/v1/cleanup-policies/{id}:
    get:
      tags: [Cleanup]
      operationId: getCleanupPolicy
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/CleanupPolicy' } } } }
        '404': { description: Not found }
    put:
      tags: [Cleanup]
      operationId: updateCleanupPolicy
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CleanupPolicy' } } } }
      responses:
        '200': { description: Updated }
    delete:
      tags: [Cleanup]
      operationId: deleteCleanupPolicy
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        '204': { description: Deleted }

  /service/rest/v1/cleanup-policies/{id}/run:
    post:
      tags: [Cleanup]
      summary: Trigger a cleanup policy immediately (async)
      operationId: runCleanupPolicy
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, description: "Policy ID, or '_all' to run all enabled policies" }
      responses:
        '202': { description: Accepted — running in background }

  # ── Audit Log ────────────────────────────────────────────────

  /service/rest/v1/audit:
    get:
      tags: [Audit]
      summary: Query the audit log
      operationId: listAuditEvents
      parameters:
        - { name: domain, in: query, schema: { type: string }, description: "Filter by domain (REPOSITORY, SECURITY, ...)" }
        - { name: action, in: query, schema: { type: string }, description: "Filter by action (CREATE, DELETE, ...)" }
        - { name: limit,  in: query, schema: { type: integer, default: 100 } }
        - { name: offset, in: query, schema: { type: integer, default: 0 } }
      responses:
        '200':
          description: Audit events
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AuditEvent' }

  # ── Scheduled Tasks ──────────────────────────────────────────

  /service/rest/v1/tasks:
    get:
      tags: [Tasks]
      operationId: listTasks
      parameters:
        - { name: type, in: query, schema: { type: string } }
      responses:
        '200': { description: OK }

  /service/rest/v1/tasks/{id}:
    get:
      tags: [Tasks]
      operationId: getTask
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        '200': { description: OK }

  /service/rest/v1/tasks/{id}/run:
    post:
      tags: [Tasks]
      summary: Manually trigger a task
      operationId: runTask
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        '204': { description: Triggered }

  /service/rest/v1/tasks/{id}/stop:
    post:
      tags: [Tasks]
      operationId: stopTask
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        '204': { description: Stopped }

  # ── Status ───────────────────────────────────────────────────

  /service/rest/v1/status:
    get:
      tags: [Status]
      summary: System status (authenticated)
      operationId: getStatus
      responses:
        '200': { description: OK }

  /service/rest/v1/status/check:
    get:
      tags: [Status]
      summary: Health check (no auth required)
      operationId: healthCheck
      security: []
      responses:
        '200': { description: OK }
        '503': { description: Unhealthy }

  /service/rest/v1/status/writable:
    get:
      tags: [Status]
      summary: Writeable check
      operationId: checkWritable
      responses:
        '200': { description: Writable }

  # ── LDAP ─────────────────────────────────────────────────────

  /service/rest/v1/security/ldap:
    get:
      tags: [LDAP]
      operationId: listLdapServers
      responses:
        '200': { description: OK }
    post:
      tags: [LDAP]
      operationId: createLdapServer
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        '201': { description: Created }

  /service/rest/v1/security/ldap/{name}:
    get:
      tags: [LDAP]
      operationId: getLdapServer
      parameters: [{ name: name, in: path, required: true, schema: { type: string } }]
      responses:
        '200': { description: OK }
    put:
      tags: [LDAP]
      operationId: updateLdapServer
      parameters: [{ name: name, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        '204': { description: Updated }
    delete:
      tags: [LDAP]
      operationId: deleteLdapServer
      parameters: [{ name: name, in: path, required: true, schema: { type: string } }]
      responses:
        '204': { description: Deleted }

  /service/rest/v1/security/ldap/{name}/test:
    post:
      tags: [LDAP]
      summary: Test LDAP connection
      operationId: testLdapServer
      parameters: [{ name: name, in: path, required: true, schema: { type: string } }]
      responses:
        '204': { description: Connection OK }

  # ── Routing Rules ────────────────────────────────────────────

  /service/rest/v1/routing-rules:
    get:
      tags: [RoutingRules]
      operationId: listRoutingRules
      responses:
        '200': { description: OK }
    post:
      tags: [RoutingRules]
      operationId: createRoutingRule
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        '200': { description: Created }

  /service/rest/v1/routing-rules/{name}:
    get:
      tags: [RoutingRules]
      operationId: getRoutingRule
      parameters: [{ name: name, in: path, required: true, schema: { type: string } }]
      responses:
        '200': { description: OK }
    put:
      tags: [RoutingRules]
      operationId: updateRoutingRule
      parameters: [{ name: name, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        '204': { description: Updated }
    delete:
      tags: [RoutingRules]
      operationId: deleteRoutingRule
      parameters: [{ name: name, in: path, required: true, schema: { type: string } }]
      responses:
        '204': { description: Deleted }

  # ================================================================
  # NEXSPENCE NATIVE API — /api/v1/
  # Extended features not in Nexus
  # ================================================================

  # ── Migration ───────────────────────────────────────────────

  /api/v1/migration/jobs:
    get:
      tags: [Migration]
      summary: List migration jobs
      operationId: listMigrationJobs
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/MigrationJob' }
    post:
      tags: [Migration]
      summary: Start a new migration from Nexus source
      operationId: createMigrationJob
      description: |
        Connects to a live Nexus/Pro instance and pulls:
        - Repository definitions
        - User accounts and roles
        - Cleanup policies
        - Artifact metadata and blobs (streamed)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceUrl, sourceUsername, sourcePassword]
              properties:
                sourceUrl:        { type: string, example: "https://nexus.example.com" }
                sourceUsername:   { type: string }
                sourcePassword:   { type: string }
                migrateRepos:     { type: boolean, default: true }
                migrateUsers:     { type: boolean, default: true }
                migrateBlobs:     { type: boolean, default: true }
                migratePolicies:  { type: boolean, default: true }
                repoFilter:       { type: array, items: { type: string }, description: "Only migrate these repos. Empty = all." }
                concurrency:      { type: integer, default: 4, description: "Parallel blob download workers" }
      responses:
        '201':
          description: Job created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MigrationJob' }

  /api/v1/migration/jobs/{id}:
    get:
      tags: [Migration]
      summary: Get migration job status
      operationId: getMigrationJob
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/MigrationJob' } } } }

  /api/v1/migration/jobs/{id}/pause:
    post:
      tags: [Migration]
      summary: Pause migration (resumes from last cursor)
      operationId: pauseMigrationJob
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        '204': { description: Paused }

  /api/v1/migration/jobs/{id}/resume:
    post:
      tags: [Migration]
      summary: Resume paused migration
      operationId: resumeMigrationJob
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        '204': { description: Resumed }

  /api/v1/migration/jobs/{id}/cancel:
    post:
      tags: [Migration]
      summary: Cancel migration job
      operationId: cancelMigrationJob
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        '204': { description: Cancelled }

  /api/v1/migration/jobs/{id}/errors:
    get:
      tags: [Migration]
      summary: Get migration errors log
      operationId: getMigrationErrors
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 100 } }
      responses:
        '200':
          description: Error list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    time:       { type: string, format: date-time }
                    repository: { type: string }
                    path:       { type: string }
                    error:      { type: string }

  /api/v1/migration/preview:
    post:
      tags: [Migration]
      summary: Preview what would be migrated (dry-run)
      operationId: previewMigration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceUrl, sourceUsername, sourcePassword]
              properties:
                sourceUrl:      { type: string }
                sourceUsername: { type: string }
                sourcePassword: { type: string }
      responses:
        '200':
          description: Migration preview
          content:
            application/json:
              schema:
                type: object
                properties:
                  repositories:  { type: array, items: { $ref: '#/components/schemas/Repository' } }
                  userCount:     { type: integer }
                  roleCount:     { type: integer }
                  totalAssets:   { type: integer }
                  totalBytes:    { type: integer }
                  formatBreakdown:
                    type: object
                    additionalProperties: { type: integer }
                  conflicts:
                    type: array
                    items:
                      type: object
                      properties:
                        type:    { type: string }
                        name:    { type: string }
                        message: { type: string }

  # ── System info ──────────────────────────────────────────────

  /api/v1/system/info:
    get:
      tags: [System]
      summary: Extended system information
      operationId: getSystemInfo
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:       { type: string }
                  goVersion:     { type: string }
                  uptime:        { type: integer }
                  goroutines:    { type: integer }
                  dbConnections: { type: integer }
                  memStats:
                    type: object
                    properties:
                      heapAlloc:   { type: integer }
                      heapSys:     { type: integer }
                      numGC:       { type: integer }

  /api/v1/system/config:
    get:
      tags: [System]
      summary: Get all system configuration keys
      operationId: getSystemConfig
      responses:
        '200': { description: OK }
    patch:
      tags: [System]
      summary: Update system configuration values
      operationId: updateSystemConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '204': { description: Updated }

tags:
  - { name: Auth,          description: "Login and current-user endpoints" }
  - { name: Repositories,  description: "Repository management (Nexus-compatible)" }
  - { name: Components,    description: "Component upload/download/search (Nexus-compatible)" }
  - { name: Assets,        description: "Asset management (Nexus-compatible)" }
  - { name: Search,        description: "Component and asset search (Nexus-compatible)" }
  - { name: Security,      description: "Users, roles, privileges, tokens (Nexus-compatible)" }
  - { name: BlobStores,    description: "Blob store management (Nexus-compatible)" }
  - { name: Cleanup,       description: "Cleanup policies — CRUD + on-demand trigger" }
  - { name: Audit,         description: "Audit log (Nexus-compatible)" }
  - { name: Tasks,         description: "Scheduled tasks (Nexus-compatible, stub)" }
  - { name: LDAP,          description: "LDAP server configuration (Nexus-compatible, stub)" }
  - { name: RoutingRules,  description: "Routing rules for proxy repos (Nexus Pro → free in Nexspence, stub)" }
  - { name: Status,        description: "Health and status endpoints (Nexus-compatible)" }
  - { name: Migration,     description: "Nexspence-native: migrate from Nexus/Pro (stub)" }
  - { name: System,        description: "Nexspence-native: system info and metrics" }
